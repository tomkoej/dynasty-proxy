<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d; --dim:#6b7280;
      --muted:#374151; --text:#e5e5e5; --green:#16a34a; --green-hi:#22c55e;
      --blue:#2563eb; --red:#dc2626;
      --font:"SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; min-height:100vh; }

    /* Header */
    #header {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:16px 24px; border-bottom:1px solid var(--border);
      background:var(--surface); position:sticky; top:0; z-index:20;
    }
    #header h1 { font-size:18px; font-weight:700; }
    #header h1 span { color:var(--green-hi); }
    #header p  { color:var(--dim); font-size:12px; margin-top:3px; }
    #header-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    #header-btns  { display:flex; gap:6px; align-items:center; }
    .hdr-btn {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:6px 12px; border-radius:6px; font-family:var(--font); font-size:13px;
      cursor:pointer; transition:border-color .15s; white-space:nowrap;
    }
    .hdr-btn:hover:not(:disabled) { border-color:var(--green); }
    .hdr-btn:disabled { opacity:.4; cursor:default; }
    #refresh-btn { }
    #timestamp { color:#fff; font-size:11px; }
    #debug     { color:var(--muted); font-size:10px; }

    /* Main */
    #main { max-width:680px; margin:0 auto; padding:20px 24px 60px; }
    .sec-label { color:var(--dim); font-size:11px; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    .section-divider { border:none; border-top:1px solid var(--border); margin:18px 0; }

    /* Add player */
    #add-section { margin-bottom:20px; position:relative; }
    #add-search {
      width:100%; background:var(--surface); border:1px solid var(--border);
      color:var(--text); padding:9px 14px; border-radius:6px;
      font-family:var(--font); font-size:14px;
    }
    #add-search:focus { outline:none; border-color:var(--green); }
    #add-search::placeholder { color:var(--muted); }
    #pool-status { color:var(--dim); font-size:11px; margin-top:5px; }
    #add-results {
      position:absolute; top:calc(100% - 26px); left:0; right:0;
      background:var(--surface); border:1px solid var(--border);
      border-top:none; border-radius:0 0 6px 6px;
      overflow-y:auto; z-index:100; display:none; max-height:260px;
    }
    .add-result { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; cursor:pointer; gap:8px; }
    .add-result:hover { background:var(--muted); }
    .add-result-name { color:var(--text); }
    .add-result-meta { color:var(--dim); font-size:12px; }
    .add-result.already { opacity:.4; cursor:default; }

    /* Filters */
    #filter-section { margin-bottom:16px; }
    #filter-bar { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-select {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:7px 10px; border-radius:6px; font-family:var(--font); font-size:13px;
      cursor:pointer; flex:1; min-width:120px;
    }
    .filter-select:focus { outline:none; border-color:var(--green); }

    /* Legend */
    #legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot  { width:11px; height:11px; border-radius:50%; border:1px solid var(--border); flex-shrink:0; }
    .legend-label { color:var(--dim); font-size:12px; }

    /* League key */
    #league-key { color:var(--muted); font-size:11px; margin-bottom:20px; line-height:2; }
    .league-group { margin-bottom:2px; }
    .league-group-label { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.04em; margin-right:6px; }

    /* Player list */
    .player-row { margin-bottom:14px; }
    .player-name-row { display:flex; align-items:center; gap:8px; }
    .remove-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--font); font-size:14px; padding:0 2px; line-height:1; flex-shrink:0; margin-left:auto; }
    .remove-btn:hover { color:var(--red); }
    .player-name { color:var(--text); }
    .player-pos  { color:var(--text); font-size:14px; }
    .player-team { color:var(--text); font-size:14px; }
    .icon-row-group { margin-top:6px; padding-left:20px; display:flex; flex-direction:column; gap:5px; }
    .icon-row-line  { display:flex; align-items:center; gap:5px; }
    .row-label { color:#fff; font-size:10px; min-width:46px; }
    .league-icon {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; border-radius:50%; color:white;
      font-size:10px; font-weight:700; border:1px solid var(--border);
      cursor:default; flex-shrink:0;
    }
    .nwo-oval { display:inline-flex; gap:3px; align-items:center; border:1px solid rgba(255,255,255,0.2); border-radius:14px; padding:1px 5px; }
    .no-results { color:var(--dim); font-size:13px; padding:8px 0; }

    /* History panel */
    #history-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:14px; margin-bottom:20px; display:none;
    }
    #history-panel h3 { font-size:13px; font-weight:600; margin-bottom:10px; color:var(--text); }
    .history-entry {
      display:flex; align-items:center; justify-content:space-between;
      padding:7px 0; border-bottom:1px solid var(--muted); gap:10px;
    }
    .history-entry:last-child { border-bottom:none; }
    .history-meta { display:flex; flex-direction:column; gap:2px; }
    .history-time { color:var(--dim); font-size:11px; }
    .history-desc { color:var(--text); font-size:13px; }
    .history-count { color:var(--dim); font-size:11px; }
    .revert-btn {
      background:none; border:1px solid var(--border); color:var(--dim);
      padding:4px 10px; border-radius:4px; font-family:var(--font);
      font-size:11px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    }
    .revert-btn:hover { border-color:var(--green); color:var(--text); }
    .history-empty { color:var(--dim); font-size:13px; }
  </style>
</head>
<body>

<div id="header">
  <div>
    <h1>🏈 <span>Dynasty</span> Watchlist</h1>
    <p id="subtitle">—</p>
  </div>
  <div id="header-right">
    <div id="header-btns">
      <button class="hdr-btn" id="undo-btn" onclick="undo()" disabled title="Undo">↩ Undo</button>
      <button class="hdr-btn" id="redo-btn" onclick="redo()" disabled title="Redo">↪ Redo</button>
      <button class="hdr-btn" id="history-btn" onclick="toggleHistory()">🕐 History</button>
      <button class="hdr-btn" id="refresh-btn" onclick="doRefresh()">↻ Refresh</button>
    </div>
    <div id="timestamp">Not yet refreshed</div>
    <div id="debug"></div>
  </div>
</div>

<div id="main">

  <div id="add-section">
    <span class="sec-label">Add from MFL Player Pool</span>
    <input id="add-search" type="text" placeholder="Search by name…" autocomplete="off"
      oninput="onAddInput()" onfocus="onAddInput()" onblur="hideResultsDelayed()">
    <div id="add-results"></div>
    <div id="pool-status">Loading player pool…</div>
  </div>

  <hr class="section-divider">

  <!-- History panel (hidden by default) -->
  <div id="history-panel">
    <h3>Watchlist History</h3>
    <div id="history-list"></div>
  </div>

  <div id="filter-section">
    <span class="sec-label">Filter Watchlist</span>
    <div id="filter-bar">
      <select id="wl-name"   class="filter-select" onchange="renderList()"><option value="">Players</option></select>
      <select id="wl-pos"    class="filter-select" onchange="renderList()">
        <option value="">Positions</option>
        <option>QB</option><option>RB</option><option>WR</option><option>TE</option>
      </select>
      <select id="wl-team"   class="filter-select" onchange="renderList()"><option value="">Teams</option></select>
      <select id="wl-status" class="filter-select" onchange="renderList()">
        <option value="">Statuses</option>
        <option value="available">Available</option>
        <option value="mine">My Team</option>
        <option value="taken">Rostered</option>
        <option value="unknown">Unknown</option>
      </select>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div><span class="legend-label">Available</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div><span class="legend-label">My Team</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div><span class="legend-label">Rostered</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#1f2937"></div><span class="legend-label">Unknown</span></div>
  </div>

  <div id="league-key"></div>
  <div id="player-list"></div>

</div>

<script>
const LEAGUES = [
  { server:"www42", id:"71526",             label:"SF"     },
  { server:"www47", id:"13133",             label:"SF"     },
  { server:"www47", id:"52453",             label:"SF/TE+" },
  { server:"www48", id:"68291",             label:"SF/TE+" },
  { server:"www47", id:"69382",             label:"SF/TE+" },
  { server:"www47", id:"64818", twoCopy:true, label:"SF/TE+" },
];
const MY_TEAM_NAMES = {  // display names shown in the UI
  "71526":"QC at the Kratom Factory","13133":"Mediocre Morsov",
  "52453":"Cleon LIX","68291":"The Undertaker","69382":"Shotgun Shai-Hulud",
  "64818":"The Undertaker (nWo)",
};
// Actual franchise names as they appear in MFL (used for roster matching only)
const MY_TEAM_MATCH = {
  "64818":"The Undertaker",  // nWo franchise is named "The Undertaker" in MFL
};
const DEFAULT_WATCHLIST = [
  {name:"Brandon Aiyuk",pos:"WR"},{name:"Erick All",pos:"TE"},{name:"Cyrus Allen",pos:"WR"},
  {name:"LeQuint Allen",pos:"RB"},{name:"Tyson Bagent",pos:"QB"},{name:"Malik Benson",pos:"WR"},
  {name:"Nate Boerkircher",pos:"TE"},{name:"Isaiah Bond",pos:"WR"},{name:"Deion Burks",pos:"WR"},
  {name:"Keon Coleman",pos:"WR"},{name:"Mitchell Evans",pos:"TE"},{name:"Ryan Flournoy",pos:"WR"},
  {name:"Theo Johnson",pos:"TE"},{name:"Cole Kmet",pos:"TE"},{name:"Charlie Kolar",pos:"TE"},
  {name:"Bryce Lance",pos:"WR"},{name:"Kendre Miller",pos:"RB"},{name:"Jalen Milroe",pos:"QB"},
  {name:"Joe Mixon",pos:"RB"},{name:"Tyren Montgomery",pos:"WR"},{name:"Devin Neal",pos:"RB"},
  {name:"Garrett Nussmeier",pos:"QB"},{name:"Adam Randall",pos:"RB"},{name:"Ja'Tavion Sanders",pos:"TE"},
  {name:"Brenen Thompson",pos:"WR"},{name:"Cedric Tillman",pos:"WR"},{name:"Darnell Washington",pos:"TE"},
  {name:"Deshaun Watson",pos:"QB"},{name:"Jordan Whittington",pos:"WR"},
];

// ── State ─────────────────────────────────────────────────────────────────────
let watchlist    = JSON.parse(localStorage.getItem("wl")||"null") || DEFAULT_WATCHLIST;
let playerStatus = JSON.parse(localStorage.getItem("ps")||"{}");
let leagueNames  = JSON.parse(localStorage.getItem("ln")||"{}");
let lastRefresh  = localStorage.getItem("lr")||null;
let mflPlayers   = [];
let nameToId     = {};

// Undo/redo — in-memory only (resets on page reload)
let undoStack = [];
let redoStack = [];

// History — persisted to localStorage, auto-saved on every change
let history = JSON.parse(localStorage.getItem("wlHistory")||"[]");

// ── Helpers ───────────────────────────────────────────────────────────────────
const norm     = s => (s||"").toLowerCase().replace(/[^a-z]/g,"");
const flipName = n => { const p=(n||"").trim().split(" "); return p.length<2?n:`${p[p.length-1]}, ${p.slice(0,-1).join(" ")}`; };
const sortKey  = n => flipName(n).toLowerCase();
const toArr    = v => !v?[]:Array.isArray(v)?v:[v];
const clone    = obj => JSON.parse(JSON.stringify(obj));

function iconColor(s){return s==="available"?"#16a34a":s==="mine"?"#2563eb":s==="taken"?"#dc2626":"#1f2937";}
function iconLabel(s){return s==="available"?"Available":s==="mine"?"My Team":s==="taken"?"Rostered":"Unknown";}

// ── History & Undo ────────────────────────────────────────────────────────────
function recordChange(description) {
  // Push current state to undo stack BEFORE the change
  undoStack.push(clone(watchlist));
  if (undoStack.length > 100) undoStack.shift();
  redoStack = [];
  updateUndoRedoBtns();
}

function saveHistory(description) {
  // Called AFTER the change with the new watchlist
  history.unshift({
    ts: Date.now(),
    desc: description,
    watchlist: clone(watchlist),
  });
  if (history.length > 30) history.pop();
  localStorage.setItem("wlHistory", JSON.stringify(history));
  renderHistory();
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(clone(watchlist));
  watchlist = undoStack.pop();
  localStorage.setItem("wl", JSON.stringify(watchlist));
  updateUndoRedoBtns();
  buildNameDropdown(); buildTeamFilter(); renderList();
}

function redo() {
  if (!redoStack.length) return;
  undoStack.push(clone(watchlist));
  watchlist = redoStack.pop();
  localStorage.setItem("wl", JSON.stringify(watchlist));
  updateUndoRedoBtns();
  buildNameDropdown(); buildTeamFilter(); renderList();
}

function revertToHistory(index) {
  recordChange("Reverted to earlier state");
  watchlist = clone(history[index].watchlist);
  localStorage.setItem("wl", JSON.stringify(watchlist));
  saveHistory("Reverted to: " + history[index].desc);
  buildNameDropdown(); buildTeamFilter(); renderList();
}

function updateUndoRedoBtns() {
  document.getElementById("undo-btn").disabled = undoStack.length === 0;
  document.getElementById("redo-btn").disabled = redoStack.length === 0;
}

function toggleHistory() {
  const p = document.getElementById("history-panel");
  p.style.display = p.style.display === "none" ? "block" : "none";
}

function renderHistory() {
  const el = document.getElementById("history-list");
  if (!history.length) {
    el.innerHTML = '<p class="history-empty">No history yet — changes auto-save here.</p>';
    return;
  }
  el.innerHTML = history.map((h, i) => {
    const d = new Date(h.ts);
    const ts = d.toLocaleString([], {weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit"});
    return `<div class="history-entry">
      <div class="history-meta">
        <span class="history-desc">${h.desc}</span>
        <span class="history-time">${ts} · ${h.watchlist.length} players</span>
      </div>
      <button class="revert-btn" onclick="revertToHistory(${i})">Revert</button>
    </div>`;
  }).join("");
}

// ── MFL API ───────────────────────────────────────────────────────────────────
async function mfl(server, leagueId, type, year="2026") {
  const p = new URLSearchParams({server, TYPE:type, year});
  if (leagueId) p.set("L", leagueId);
  const r = await fetch(`/api/mfl?${p}`);
  if (!r.ok) throw new Error("HTTP "+r.status);
  const d = await r.json();
  if (d?.error) throw new Error(d.error);
  return d;
}

function displayName(n) { const p=(n||"").split(", "); return p.length===2?p[1]+" "+p[0]:n; }
function getPlayerMeta(name) {
  const n=norm(name);
  return mflPlayers.find(p=>p.name&&(norm(p.name)===n||norm(displayName(p.name))===n));
}
function twoCopyStatuses(mc, oc) {
  const st=[];
  for(let i=0;i<mc;i++) st.push("mine");
  for(let i=0;i<oc;i++) st.push("taken");
  while(st.length<2) st.push("available");
  return st.slice(0,2);
}

// ── Player Pool ───────────────────────────────────────────────────────────────
async function loadPlayerPool() {
  const cached=localStorage.getItem("mflPool");
  const cachedTime=parseInt(localStorage.getItem("mflPoolTime")||"0");
  if (cached && (Date.now()-cachedTime)<86400000) {
    mflPlayers=JSON.parse(cached);
  } else {
    document.getElementById("pool-status").textContent="Fetching player pool from MFL…";
    try {
      const d=await mfl("www47","52453","players","2026");
      const raw=toArr(d?.players?.player);
      if (raw.length>100) {
        mflPlayers=raw.filter(p=>["QB","RB","WR","TE"].includes(p.position));
        localStorage.setItem("mflPool",JSON.stringify(mflPlayers));
        localStorage.setItem("mflPoolTime",Date.now().toString());
      }
    } catch(e) {
      document.getElementById("pool-status").textContent="Could not load player pool: "+e.message;
      return;
    }
  }
  mflPlayers.forEach(p=>{
    if(!p.name||!p.id)return;
    nameToId[norm(p.name)]=p.id;
    nameToId[norm(displayName(p.name))]=p.id;
  });
  const ts=new Date(parseInt(localStorage.getItem("mflPoolTime")||Date.now()));
  document.getElementById("pool-status").textContent=
    `${mflPlayers.length.toLocaleString()} Players · Pool Updated ${ts.toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"})}`;
  buildTeamFilter();
  renderList();
}

// ── Add Player ────────────────────────────────────────────────────────────────
let addTimer;
function onAddInput(){clearTimeout(addTimer);addTimer=setTimeout(updateAddResults,120);}
function hideResultsDelayed(){setTimeout(()=>{document.getElementById("add-results").style.display="none";},200);}

function updateAddResults() {
  const q=norm(document.getElementById("add-search").value);
  const box=document.getElementById("add-results");
  const inWl=new Set(watchlist.map(p=>norm(p.name)));
  if (!q||q.length<2){box.style.display="none";return;}
  const results=mflPlayers
    .filter(p=>p.name&&(norm(p.name).includes(q)||norm(displayName(p.name)).includes(q)))
    .sort((a,b)=>{
      const an=norm(displayName(a.name)),bn=norm(displayName(b.name));
      return(an.startsWith(q)?0:1)-(bn.startsWith(q)?0:1)||an.localeCompare(bn);
    })
    .slice(0,12);
  if (!results.length){box.style.display="none";return;}
  box.innerHTML=results.map(p=>{
    const dn=displayName(p.name);
    const already=inWl.has(norm(dn));
    return`<div class="add-result${already?" already":""}" ${already?"":`onclick="addFromPool('${dn.replace(/'/g,"\\'")}','${p.position||""}')"`}>
      <span class="add-result-name">${flipName(dn)}</span>
      <span class="add-result-meta">${p.position||""}${p.team?" · "+p.team:""}</span>
    </div>`;
  }).join("");
  box.style.display="block";
}

function addFromPool(name, pos) {
  if (watchlist.some(p=>norm(p.name)===norm(name))) return;
  recordChange("Added "+flipName(name));
  watchlist.push({name,pos});
  localStorage.setItem("wl",JSON.stringify(watchlist));
  const status=computePlayerStatus(name);
  if (status){playerStatus[norm(name)]=status;localStorage.setItem("ps",JSON.stringify(playerStatus));}
  saveHistory("Added "+flipName(name));
  document.getElementById("add-search").value="";
  document.getElementById("add-results").style.display="none";
  buildNameDropdown();buildTeamFilter();renderList();
}

// ── Roster helpers ────────────────────────────────────────────────────────────
function loadCachedRosters() {
  const data=JSON.parse(localStorage.getItem("leagueRostersData")||"null");
  if (!data) return null;
  const result={};
  LEAGUES.forEach(cfg=>{
    const rs=data[cfg.id];
    if (!rs) result[cfg.id]=null;
    else if (rs.twoCopy) result[cfg.id]={mineCount:rs.mineCount,otherCount:rs.otherCount,twoCopy:true};
    else result[cfg.id]={mine:new Set(rs.mine),other:new Set(rs.other)};
  });
  return result;
}

function computePlayerStatus(name) {
  const pid=nameToId[norm(name)];
  const rosters=loadCachedRosters();
  if (!rosters||!pid) return null;
  const ls={};
  LEAGUES.forEach(cfg=>{
    const rs=rosters[cfg.id];
    if (!rs) ls[cfg.id]=cfg.twoCopy?["error","error"]:"error";
    else if (!pid) ls[cfg.id]=cfg.twoCopy?["unknown","unknown"]:"unknown";
    else if (cfg.twoCopy) ls[cfg.id]=twoCopyStatuses(rs.mineCount[pid]||0,rs.otherCount[pid]||0);
    else {
      if (rs.mine.has(pid)) ls[cfg.id]="mine";
      else if (rs.other.has(pid)) ls[cfg.id]="taken";
      else ls[cfg.id]="available";
    }
  });
  return ls;
}

// ── Refresh ───────────────────────────────────────────────────────────────────
async function doRefresh() {
  const btn=document.getElementById("refresh-btn");
  btn.disabled=true;btn.textContent="… Refreshing";
  const rosterErrors=[],newNames={},leagueRosters={};

  for (const cfg of LEAGUES) {
    let fetched=false;
    for (const year of ["2026","2025"]) {
      try {
        const rData=await mfl(cfg.server,cfg.id,"rosters",year);
        let myFranchiseId=null;
        try {
          const lg=await mfl(cfg.server,cfg.id,"league",year);
          newNames[cfg.id]=lg?.league?.name||cfg.id;
          const frs=toArr(lg?.league?.franchises?.franchise);
          const matchName=MY_TEAM_MATCH[cfg.id]||MY_TEAM_NAMES[cfg.id]||"";
          const myFr=frs.find(fr=>norm(fr.name)===norm(matchName));
          myFranchiseId=myFr?.id||null;
        } catch {newNames[cfg.id]=cfg.id;}
        const allFr=toArr(rData?.rosters?.franchise);

        if (cfg.twoCopy) {
          const mineCount={},otherCount={};
          allFr.forEach(fr=>{
            const isMe=myFranchiseId&&fr.id===myFranchiseId;
            toArr(fr.player).forEach(p=>{
              if(isMe) mineCount[p.id]=(mineCount[p.id]||0)+1;
              else     otherCount[p.id]=(otherCount[p.id]||0)+1;
            });
          });
          leagueRosters[cfg.id]={mineCount,otherCount,twoCopy:true};
        } else {
          const mine=new Set(),other=new Set();
          allFr.forEach(fr=>{
            const isMe=myFranchiseId&&fr.id===myFranchiseId;
            toArr(fr.player).forEach(p=>isMe?mine.add(p.id):other.add(p.id));
          });
          leagueRosters[cfg.id]={mine,other};
        }
        fetched=true;break;
      } catch(e){
        rosterErrors.push(cfg.id+"/"+year+": "+e.message);
        leagueRosters[cfg.id]=null;
      }
    }
    if (!fetched){newNames[cfg.id]=cfg.id;leagueRosters[cfg.id]=null;}
  }

  leagueNames=newNames;

  const rfs={};
  LEAGUES.forEach(cfg=>{
    const rs=leagueRosters[cfg.id];
    if (!rs) rfs[cfg.id]=null;
    else if (cfg.twoCopy) rfs[cfg.id]={mineCount:rs.mineCount,otherCount:rs.otherCount,twoCopy:true};
    else rfs[cfg.id]={mine:[...rs.mine],other:[...rs.other]};
  });
  localStorage.setItem("leagueRostersData",JSON.stringify(rfs));

  const statusMap={};
  watchlist.forEach(player=>{
    const pid=nameToId[norm(player.name)];
    const ls={};
    LEAGUES.forEach(cfg=>{
      const rs=leagueRosters[cfg.id];
      if (!rs) ls[cfg.id]=cfg.twoCopy?["error","error"]:"error";
      else if (!pid) ls[cfg.id]=cfg.twoCopy?["unknown","unknown"]:"unknown";
      else if (cfg.twoCopy) ls[cfg.id]=twoCopyStatuses(rs.mineCount[pid]||0,rs.otherCount[pid]||0);
      else {
        if(rs.mine.has(pid)) ls[cfg.id]="mine";
        else if(rs.other.has(pid)) ls[cfg.id]="taken";
        else ls[cfg.id]="available";
      }
    });
    statusMap[norm(player.name)]=ls;
  });
  playerStatus=statusMap;

  const now=new Date();
  lastRefresh=now.toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"});
  localStorage.setItem("ps",JSON.stringify(playerStatus));
  localStorage.setItem("ln",JSON.stringify(leagueNames));
  localStorage.setItem("lr",lastRefresh);

  const loaded=Object.values(leagueRosters).filter(r=>r!==null).length;
  document.getElementById("debug").textContent=loaded+"/6 leagues"+(rosterErrors.length?" · "+rosterErrors[0]:"");
  document.getElementById("timestamp").textContent="Updated "+lastRefresh;
  btn.disabled=false;btn.textContent="↻ Refresh";
  renderLeagueKey();renderList();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderLeagueKey() {
  const groups=[
    {label:"SF",    ids:LEAGUES.filter(c=>c.label==="SF")},
    {label:"SF/TE+",ids:LEAGUES.filter(c=>c.label==="SF/TE+")},
  ];
  document.getElementById("league-key").innerHTML=groups.map(g=>{
    const items=g.ids.map(c=>`[${LEAGUES.indexOf(c)+1}] ${MY_TEAM_NAMES[c.id]||c.id}`).join("  ");
    return`<div class="league-group"><span class="league-group-label">${g.label}</span>${items}</div>`;
  }).join("");
}

function buildTeamFilter() {
  const teams=new Set();
  watchlist.forEach(p=>{const m=getPlayerMeta(p.name);if(m?.team)teams.add(m.team);});
  const sorted=[...teams].sort();
  const sel=document.getElementById("wl-team");
  const cur=sel.value;
  sel.innerHTML='<option value="">Teams</option>'+sorted.map(t=>`<option${t===cur?" selected":""}>${t}</option>`).join("");
}

function buildNameDropdown() {
  const sel=document.getElementById("wl-name");
  const cur=sel.value;
  const sorted=[...watchlist].sort((a,b)=>sortKey(a.name).localeCompare(sortKey(b.name)));
  sel.innerHTML='<option value="">Players</option>'+
    sorted.map(p=>`<option value="${norm(p.name)}"${norm(p.name)===cur?" selected":""}>${flipName(p.name)}</option>`).join("");
}

function renderList() {
  const nameF  =document.getElementById("wl-name").value;
  const posF   =document.getElementById("wl-pos").value;
  const teamF  =document.getElementById("wl-team").value;
  const statusF=document.getElementById("wl-status").value;
  const el     =document.getElementById("player-list");

  const sorted=watchlist
    .map((p,i)=>({...p,i}))
    .sort((a,b)=>sortKey(a.name).localeCompare(sortKey(b.name)))
    .filter(p=>{
      if(nameF&&norm(p.name)!==nameF)return false;
      if(posF&&p.pos!==posF)return false;
      if(teamF){const m=getPlayerMeta(p.name);if((m?.team||"")!==teamF)return false;}
      if(statusF){
        const st=playerStatus[norm(p.name)]||{};
        if(!Object.values(st).flatMap(v=>Array.isArray(v)?v:[v]).some(v=>v===statusF))return false;
      }
      return true;
    });

  document.getElementById("subtitle").textContent=watchlist.length+" players · 6 leagues";
  if(!sorted.length){el.innerHTML='<p class="no-results">No players match.</p>';return;}

  const makeIcon=(cfg,s)=>{
    const num=LEAGUES.indexOf(cfg)+1,ln=MY_TEAM_NAMES[cfg.id]||cfg.id;
    if(cfg.twoCopy&&Array.isArray(s)){
      return`<span class="nwo-oval">`+s.map((si,k)=>`<span class="league-icon" style="background:${iconColor(si)}" title="[${num}] ${ln} — Copy ${k+1}: ${iconLabel(si)}">${num}</span>`).join("")+`</span>`;
    }
    const sv=typeof s==="string"?s:"unknown";
    return`<span class="league-icon" style="background:${iconColor(sv)}" title="[${num}] ${ln} — ${iconLabel(sv)}">${num}</span>`;
  };

  el.innerHTML=sorted.map(({name,pos,i})=>{
    const status=playerStatus[norm(name)]||{};
    const meta=getPlayerMeta(name);
    const team=meta?.team||"";
    const sfIcons  =LEAGUES.filter(c=>c.label==="SF"   ).map(c=>makeIcon(c,status[c.id])).join("");
    const sfteIcons=LEAGUES.filter(c=>c.label==="SF/TE+").map(c=>makeIcon(c,status[c.id])).join("");
    return`<div class="player-row">
      <div class="player-name-row">
        <span class="player-name">${flipName(name)}</span>
        <span class="player-pos">${pos}</span>
        ${team?`<span class="player-team">${team}</span>`:""}
        <button class="remove-btn" onclick="removePlayer(${i})">×</button>
      </div>
      <div class="icon-row-group">
        <div class="icon-row-line"><span class="row-label">SF</span>${sfIcons}</div>
        <div class="icon-row-line"><span class="row-label">SF/TE+</span>${sfteIcons}</div>
      </div>
    </div>`;
  }).join("");
}

function removePlayer(i) {
  const name=watchlist[i]?.name||"Player";
  recordChange("Removed "+flipName(name));
  watchlist=watchlist.filter((_,j)=>j!==i);
  localStorage.setItem("wl",JSON.stringify(watchlist));
  saveHistory("Removed "+flipName(name));
  buildNameDropdown();buildTeamFilter();renderList();
}

// ── Init ──────────────────────────────────────────────────────────────────────
if(lastRefresh) document.getElementById("timestamp").textContent="Updated "+lastRefresh;
renderLeagueKey();buildNameDropdown();renderList();renderHistory();
loadPlayerPool();
</script>
