<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d; --dim:#6b7280;
      --muted:#374151; --text:#e5e5e5; --green:#16a34a; --green-hi:#22c55e;
      --blue:#2563eb; --red:#dc2626;
      --font:"SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
    }
    html, body { height:100%; background:#0d1117; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; }
    #page-wrap   { display:flex; flex-direction:column; height:100vh; background:#0d1117; }
    #frozen-top  { flex-shrink:0; background:var(--bg); }
    #filter-panel { display:none; position:fixed; z-index:9999; background:var(--surface); border:1px solid var(--border); border-radius:6px; max-height:220px; overflow-y:auto; box-shadow:0 4px 16px rgba(0,0,0,.5); }
    #scroll-list { flex:1; overflow-y:auto; min-height:0; background:#0d1117; overscroll-behavior:none; }
    #list-inner  { max-width:680px; margin:0 auto; padding:16px 24px 60px; }

    #header {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:16px 24px; border-bottom:1px solid var(--border); background:var(--surface);
    }
    #header h1 { font-size:18px; font-weight:700; }
    #header h1 span { color:var(--green-hi); }
    #header p  { color:var(--dim); font-size:12px; margin-top:3px; }
    #header-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    #header-btns  { display:flex; gap:6px; align-items:center; }
    .hdr-btn {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:6px 12px; border-radius:6px; font-family:var(--font); font-size:13px;
      cursor:pointer; transition:border-color .15s; white-space:nowrap;
    }
    .hdr-btn:hover:not(:disabled) { border-color:var(--green); }
    .hdr-btn:disabled { opacity:.4; cursor:default; }
    #timestamp { color:#fff; font-size:11px; }
    #debug     { color:var(--muted); font-size:10px; }

    #main { max-width:680px; margin:0 auto; padding:20px 24px 0; }
    .sec-label { color:var(--dim); font-size:11px; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    .section-divider { border:none; border-top:1px solid var(--border); margin:18px 0; }

    #add-section { margin-bottom:20px; position:relative; }
    #add-search {
      width:100%; background:var(--surface); border:1px solid var(--border);
      color:var(--text); padding:9px 14px; border-radius:6px; font-family:var(--font); font-size:14px;
    }
    #add-search:focus { outline:none; border-color:var(--green); }
    #add-search::placeholder { color:var(--muted); }
    #pool-status { color:var(--dim); font-size:11px; margin-top:5px; }
    #add-results {
      position:absolute; top:calc(100% - 26px); left:0; right:0;
      background:var(--surface); border:1px solid var(--border); border-top:none;
      border-radius:0 0 6px 6px; overflow-y:auto; z-index:100; display:none; max-height:260px;
    }
    .add-result { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; cursor:pointer; gap:8px; }
    .add-result:hover { background:var(--muted); }
    .add-result-name { color:var(--text); }
    .add-result-meta { color:var(--dim); font-size:12px; }
    .add-result.already { opacity:.4; cursor:default; }

    #filter-section { margin-bottom:16px; }
    .filter-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .filter-header .sec-label { margin-bottom:0; }
    .clear-btn { background:none; border:none; color:var(--dim); font-family:var(--font); font-size:11px; cursor:pointer; padding:0; }
    .clear-btn:hover { color:var(--text); text-decoration:underline; }
    #filter-bar { display:flex; gap:8px; flex-wrap:wrap; }
    .cs-wrap { position:relative; flex:0 0 auto; }
    .cs-btn {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:7px 12px; border-radius:6px; font-family:var(--font); font-size:13px;
      cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; width:100%;
    }
    .cs-spacer { flex:1; min-width:12px; }
    .cs-btn:hover { border-color:var(--dim); }
    .cs-btn.has-val { border-color:var(--green); }
    .cs-arr { font-size:9px; color:var(--dim); flex-shrink:0; }
    .cs-list { display:none; }
    .cs-list.open { display:block; }
    .cs-btn.panel-open { border-color:var(--green); }
    .cs-opt { padding:8px 12px; cursor:pointer; font-size:13px; color:var(--text); white-space:nowrap; }
    .cs-opt:hover { background:var(--muted); }
    .cs-opt.active .cs-chk { color:var(--green-hi); }
    .cs-opt.active { color:var(--text); }
    .cs-chk { display:inline-block; width:16px; color:var(--dim); font-size:11px; flex-shrink:0; }
    .cs-search-wrap { padding:8px 10px 4px; border-bottom:1px solid var(--border); }
    .cs-search-input {
      width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
      padding:5px 8px; border-radius:4px; font-family:var(--font); font-size:12px; outline:none;
    }
    .cs-search-input:focus { border-color:var(--green); }
    .cs-badge { background:var(--green); color:white; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; margin-right:2px; flex-shrink:0; }

    #legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot  { width:11px; height:11px; border-radius:50%; border:1px solid var(--border); flex-shrink:0; }
    .legend-label { color:var(--dim); font-size:12px; }

    #league-key { font-size:11px; margin-bottom:20px; line-height:2; }
    .lk-item { color:var(--muted); transition:color .15s; }
    .lk-item.lk-active { color:#fff; font-weight:600; }
    .league-group-label { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.04em; margin-right:6px; transition:color .15s; }
    .league-group-label.lk-active { color:#fff; font-weight:600; }
    .league-group { margin-bottom:2px; }

    /* Player rows */
    .player-row { margin-bottom:0; padding:16px 0 14px; border-bottom:1px solid var(--border); }
    .player-name-row { display:flex; align-items:center; gap:8px; }
    .remove-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--font); font-size:14px; padding:0 2px; line-height:1; flex-shrink:0; margin-left:auto; }
    .remove-btn:hover { color:var(--red); }
    .player-name { color:var(--text); }
    .player-pos  { color:var(--text); font-size:14px; }
    .player-team { color:var(--text); font-size:14px; }
    .rookie-badge { background:#d97706; color:#fff; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; flex-shrink:0; }

    /* Icon rows */
    .icon-row-group { margin-top:0; padding-left:36px; display:flex; flex-direction:column; gap:5px; }
    .icon-row-line  { display:flex; align-items:center; gap:5px; }
    .row-label { color:#fff; font-size:10px; min-width:42px; }
    .league-icon {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; border-radius:50%; color:white;
      font-size:10px; font-weight:700; border:1px solid var(--border); cursor:default; flex-shrink:0;
    }
    .nwo-oval { display:inline-flex; gap:3px; align-items:center; border:1px solid rgba(255,255,255,0.2); border-radius:14px; padding:1px 5px; }
    .owner-toggle { background:none; border:none; color:var(--dim); cursor:pointer; font-family:var(--font); font-size:10px; padding:0; line-height:1; flex-shrink:0; width:16px; text-align:center; transition:transform .15s; display:inline-block; }
    .owner-toggle:hover { color:var(--text); }
    .owner-toggle.open { transform:rotate(90deg); }
    .owner-toggle-ph { width:16px; flex-shrink:0; display:inline-block; }
    .player-section-label { color:var(--dim); font-size:9px; text-transform:uppercase; letter-spacing:.05em; padding-left:24px; display:block; margin:5px 0 4px; }
    .avail-grid      { display:flex; gap:20px; padding-left:36px; margin-top:3px; }
    .avail-col       { display:flex; flex-direction:column; gap:2px; }
    .avail-col-label { color:#fff; font-size:10px; margin-bottom:4px; }
    .owner-line      { color:var(--dim); font-size:11px; line-height:1.6; transition:color .15s; }
    .owner-line.hl   { color:var(--text); }

    .no-results { color:var(--dim); font-size:13px; padding:8px 0; }
    .auth-input {
      width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
      padding:7px 10px; border-radius:5px; font-family:var(--font); font-size:12px;
      outline:none; margin-bottom:8px; display:block;
    }
    .auth-input:focus { border-color:var(--green); }
    #mfl-auth-status { font-size:11px; color:var(--dim); margin-top:8px; min-height:16px; }
    .expand-toggle-label { display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
    .expand-toggle-label input[type="checkbox"] { display:none; }
    .toggle-track {
      width:30px; height:17px; border-radius:9px; background:var(--muted);
      position:relative; transition:background .2s; flex-shrink:0;
    }
    .expand-toggle-label input:checked ~ .toggle-track { background:var(--green); }
    .toggle-thumb {
      position:absolute; top:2px; left:2px; width:13px; height:13px;
      border-radius:50%; background:#fff; transition:transform .2s;
    }
    .expand-toggle-label input:checked ~ .toggle-track .toggle-thumb { transform:translateX(13px); }
    .toggle-text { color:var(--dim); font-size:11px; font-family:var(--font); }

    #history-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:14px; margin-bottom:20px; display:none;
    }
    #history-panel h3 { font-size:13px; font-weight:600; margin-bottom:10px; color:var(--text); }
    .history-entry { display:flex; flex-direction:column; padding:8px 0; border-bottom:1px solid var(--muted); }
    .history-entry:last-child { border-bottom:none; }
    .history-entry.best-restore { border-left:2px solid var(--green); padding-left:8px; margin-left:-10px; }
    .history-best-badge { font-size:10px; color:var(--green); font-weight:600; margin-bottom:3px; letter-spacing:.04em; }
    .history-entry-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .history-meta { display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
    .history-time { color:var(--dim); font-size:11px; }
    .history-desc { color:var(--text); font-size:13px; }
    .history-actions { display:flex; gap:5px; flex-shrink:0; align-items:center; }
    .expand-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:3px 7px; border-radius:4px; font-family:var(--font); font-size:11px; cursor:pointer; white-space:nowrap; }
    .expand-btn:hover { border-color:var(--text); color:var(--text); }
    .revert-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:4px 10px; border-radius:4px; font-family:var(--font); font-size:11px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .revert-btn:hover { border-color:var(--green); color:var(--green); }
    .history-players { margin-top:6px; padding:6px 8px; background:var(--bg); border-radius:4px; font-size:11px; color:var(--dim); line-height:1.7; }
    .history-empty { color:var(--dim); font-size:13px; }
    #debug-ticker { position:fixed; bottom:0; left:0; right:0; z-index:9998; background:#0d1117; border-top:1px solid #2a3040; padding:4px 14px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; font-family:var(--font); font-size:10px; line-height:1.6; }
    #debug-ticker .dt-val { color:#6b7280; }
    #debug-ticker .dt-key { color:#374151; margin-right:3px; }
    #debug-ticker .dt-err { color:#ef4444; font-weight:600; }
    #debug-ticker .dt-sep { color:#2a3040; }

    #mfl-keys-panel { display:none; position:fixed; top:58px; right:24px; z-index:9999; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; min-width:320px; box-shadow:0 4px 16px rgba(0,0,0,.6); }
    #mfl-keys-panel h4 { font-size:12px; color:var(--dim); margin-bottom:12px; letter-spacing:.05em; }
    #mfl-keys-panel .keys-instructions { font-size:11px; color:var(--dim); margin-bottom:12px; line-height:1.5; }
    .keys-row { display:flex; flex-direction:column; gap:3px; margin-bottom:10px; }
    .keys-label { font-size:11px; color:var(--dim); }
    .keys-input { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 8px; border-radius:4px; font-family:var(--font); font-size:11px; width:100%; }
    .keys-input:focus { outline:none; border-color:var(--green); }
    #mfl-keys-panel .keys-save { background:var(--green); color:#fff; border:none; padding:7px 16px; border-radius:5px; font-family:var(--font); font-size:12px; cursor:pointer; width:100%; margin-top:4px; }
  </style>
</head>
<body>
<div id="page-wrap">
<div id="frozen-top">
<div id="header">
  <div>
    <h1>🏈 <span>Dynasty</span> Watchlist <span id="app-version" style="color:var(--muted);font-size:12px;font-weight:400;letter-spacing:.02em;"></span></h1>
    <p id="subtitle">—</p>
  </div>
  <div id="header-right">
    <div id="header-btns">
      <button class="hdr-btn" id="mfl-keys-btn" onclick="toggleMflKeys()">🔑 API Keys</button>
      <button class="hdr-btn" id="refresh-btn" onclick="forceRefresh()">⟳ Refresh</button>
      <button class="hdr-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
      <button class="hdr-btn" id="redo-btn" onclick="redo()" disabled>↪ Redo</button>
      <button class="hdr-btn" onclick="toggleHistory()">🕐 History</button>
    </div>
    <div id="timestamp">Not yet refreshed</div>
  </div>
</div>

<div id="main">
  <div id="add-section">
    <input id="add-search" type="text" placeholder="Search by name" autocomplete="off"
      oninput="onAddInput()" onfocus="onAddInput()" onblur="hideResultsDelayed()">
    <div id="add-results"></div>
    <div id="pool-status">Loading player pool…</div>
  </div>

  <hr class="section-divider">

  <div id="history-panel">
    <h3>Watchlist History</h3>
    <div id="history-list"></div>
  </div>

  <div id="filter-section">
    <div class="filter-header">
      <span class="sec-label">Filter &amp; sort</span>
      <button id="clear-filters-btn" class="clear-btn" onclick="clearFilters()" style="display:none">Clear all</button>
    </div>
    <div id="filter-bar">
      <div class="cs-wrap" id="csf-name"><button class="cs-btn" onclick="csToggle(this)">Players<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-name" onclick="event.stopPropagation()"></div></div>
      <div class="cs-wrap" id="csf-pos"><button class="cs-btn" onclick="csToggle(this)">Position<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-pos" onclick="event.stopPropagation()"></div></div>
      <div class="cs-wrap" id="csf-nflteam"><button class="cs-btn" onclick="csToggle(this)">NFL Team<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-nflteam" onclick="event.stopPropagation()"></div></div>
      <div class="cs-wrap" id="csf-status"><button class="cs-btn" onclick="csToggle(this)">Status<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-status" onclick="event.stopPropagation()"></div></div>
      <div class="cs-wrap" id="csf-format"><button class="cs-btn" onclick="csToggle(this)">Format<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-format" onclick="event.stopPropagation()"></div></div>
      <div class="cs-wrap" id="csf-league"><button class="cs-btn" onclick="csToggle(this)">League<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-league" onclick="event.stopPropagation()"></div></div>
      <div class="cs-wrap" id="csf-sort"><button class="cs-btn" onclick="csToggle(this)">Sort<span class="cs-spacer"></span><span class="cs-arr">▾</span></button><div class="cs-list" id="csl-sort" onclick="event.stopPropagation()"></div></div>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div><span class="legend-label">Available</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div><span class="legend-label">My Team</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div><span class="legend-label">Rostered</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div><span class="legend-label">Trade Block</span></div>
    <div class="legend-item"><span class="rookie-badge">R</span><span class="legend-label">Rookie</span></div>
    <label class="expand-toggle-label" style="margin-left:auto">
      <input type="checkbox" id="expand-all-toggle" onchange="toggleAllOwners()">
      <span class="toggle-text">Expand</span>
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
    </label>
  </div>

  <div id="league-key"></div>
</div>
</div>
<div id="scroll-list">
  <div id="list-inner">
    <div id="player-list"></div>
  </div>
</div>
</div>

<script>
const APP_VERSION = "1.25";

// ── Debug Ticker ───────────────────────────────────────────────────────────────
let _dbgErr=null,_dbgErrTime=null;
window.onerror=(msg,src,line,col)=>{
  _dbgErr=msg+" ("+(src||"").split("/").pop()+":"+line+":"+col+")";
  _dbgErrTime=Date.now();
  _dbgUpdate();return false;
};
window.onunhandledrejection=e=>{
  _dbgErr="Promise rejection: "+(e.reason?.message||e.reason||"unknown");
  _dbgErrTime=Date.now();
  _dbgUpdate();
};
function _dbgUpdate(){
  const el=document.getElementById("debug-ticker");
  if(!el)return;
  const safeLen=(key,parse=true)=>{
    const v=localStorage.getItem(key);
    if(v===null)return"null";
    if(!parse)return v.length+"b";
    try{const p=JSON.parse(v);return Array.isArray(p)?p.length+" items":typeof p==="object"&&p?Object.keys(p).length+" keys":JSON.stringify(p).slice(0,20);}
    catch{return"ERR";}
  };
  const lrt=localStorage.getItem("lrTime");
  const ago=lrt?Math.round((Date.now()-parseInt(lrt))/1000)+"s ago":"never";
  const wlRaw=localStorage.getItem("wl");
  const wlClass=wlRaw===null?"dt-val":wlRaw==="[]"?"dt-err":"dt-val";
  const parts=[
    `<span class="dt-key">wl:</span><span class="${wlClass}">${safeLen("wl")}</span>`,
    `<span class="dt-key">history:</span><span class="dt-val">${safeLen("wlHistory")}</span>`,
    `<span class="dt-key">ps:</span><span class="dt-val">${safeLen("ps")}</span>`,
    `<span class="dt-key">pool:</span><span class="dt-val">${safeLen("mflPoolV2")}</span>`,
    `<span class="dt-key">auth:</span><span class="dt-val">${localStorage.getItem("mflUserInfo")?"✓ set":"—"}</span>`,
    `<span class="dt-key">refresh:</span><span class="dt-val">${ago}</span>`,
    _dbgErr?`<span class="dt-err">⚠ ${_dbgErr}</span>`:`<span class="dt-val">✓ no JS err</span>`,
  ];
  el.innerHTML=parts.join('<span class="dt-sep"> · </span>');
}
setInterval(_dbgUpdate,3000);

// ── League config ──────────────────────────────────────────────────────────────
const LEAGUES = [
  { server:"www42", id:"71526", label:"SF" },        // [1] QC at the Kratom Factory
  { server:"www47", id:"13133", label:"SF" },        // [2] Mediocre Morsov
  { server:"www47", id:"52453", label:"SF/TE+" },    // [3] Cleon LIX
  { server:"www48", id:"68291", label:"SF/TE+" },    // [4] The Undertaker
  { server:"www47", id:"69382", label:"SF/TE+" },    // [5] Shotgun Shai-Hulud
  { server:"www47", id:"64818", twoCopy:true, label:"SF/TE+" }, // [6] The Undertaker (nWo)
];
const MY_TEAM_NAMES = {
  "71526": "QC at the Kratom Factory",
  "13133": "Mediocre Morsov",
  "52453": "Cleon LIX",
  "68291": "The Undertaker",
  "69382": "Shotgun Shai-Hulud",
  "64818": "The Undertaker (nWo)",
};

// ── MY_TEAM_MATCH (exact franchise name inside each league — edit if different) ─
const MY_TEAM_MATCH = {
  "71526": "QC at the Kratom Factory",
  "13133": "Mediocre Morsov",
  "52453": "Cleon LIX",
  "68291": "The Undertaker",
  "69382": "Shotgun Shai-Hulud",
  "64818": "The Undertaker (nWo)",
};

// ── Utility functions ──────────────────────────────────────────────────────────
const norm    = s => (s||"").toLowerCase().replace(/[^a-z]/g,"");
const clone   = v => JSON.parse(JSON.stringify(v));
const toArr   = v => Array.isArray(v)?v:(v&&typeof v==="object"?[v]:[]);
const sortKey = n => {
  const w = (n||"").trim().split(/\s+/);
  const sfx = /^(jr\.?|sr\.?|ii|iii|iv|v)$/i;
  const last = [...w].reverse().find(p => !sfx.test(p)) || w[0];
  return (last + " " + n).toLowerCase();
};
function stripHtml(s){ return (s||"").replace(/<[^>]*>/g,""); }

// ── DEFAULT_WATCHLIST (29 dynasty targets) ─────────────────────────────────────
const DEFAULT_WATCHLIST=[
  {name:"Caleb Williams",pos:"QB"},{name:"Jayden Daniels",pos:"QB"},

function renderHistory(){
  const el=document.getElementById("history-list");
  if(!history.length){el.innerHTML='<p class="history-empty">No history yet — changes auto-save here.</p>';return;}
  const maxP=Math.max(...history.map(h=>h.watchlist?.length||0));
  const bestIdx=maxP>0?history.findIndex(h=>(h.watchlist?.length||0)===maxP):-1;
  el.innerHTML=history.map((h,i)=>{
    const ts=new Date(h.ts).toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    const wl=h.watchlist||[];
    const count=wl.length;
    const isBest=(i===bestIdx&&count>0);
    const isExp=histExpanded.has(i);
    const names=wl.map(p=>`${p.name} <span style="color:var(--dim);font-size:10px">${p.pos}</span>`).join(" &middot; ");
    return`<div class="history-entry${isBest?" best-restore":""}">
      ${isBest?'<div class="history-best-badge">&#9733; Best restore point</div>':""}
      <div class="history-entry-row">
        <div class="history-meta">
          <span class="history-desc">${h.desc}</span>
          <span class="history-time">${ts} &middot; ${count} player${count!==1?"s":""}</span>
        </div>
        <div class="history-actions">
          ${count>0?`<button class="expand-btn" onclick="hsToggle(${i})">${isExp?"&#9660; Hide":"&#9654; List"}</button>`:""}
          <button class="revert-btn" onclick="revertToHistory(${i})">&#8635; Restore${count>0?" ("+count+")":""}</button>
        </div>
      </div>
      ${isExp&&count>0?`<div class="history-players">${names}</div>`:""}
    </div>`;
  }).join("");
}

// ── MFL API ───────────────────────────────────────────────────────────────────
async function mfl(server,leagueId,type,year="2026",extra={}){
  const p=new URLSearchParams({server,TYPE:type,year}); if(leagueId)p.set("L",leagueId);
  Object.entries(extra).forEach(([k,v])=>p.set(k,v));
  const r=await fetch(`/api/mfl?${p}`); if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json(); if(d?.error){const em=typeof d.error==="string"?d.error:JSON.stringify(d.error);throw new Error(em);} return d;
}
function displayName(n){ const p=(n||"").split(", "); return p.length===2?p[1]+" "+p[0]:n; }
function getPlayerMeta(name){ const n=norm(name); return mflPlayers.find(p=>p.name&&(norm(p.name)===n||norm(displayName(p.name))===n)); }
function twoCopyStatuses(mc,oc,tb,pid){ const st=[]; for(let i=0;i<mc;i++)st.push("mine"); for(let i=0;i<oc;i++)st.push(tb?.has(pid)?"tradeblock":"taken"); while(st.length<2)st.push("available"); return st.slice(0,2); }

async function loadPlayerPool(){
  const cached=localStorage.getItem("mflPoolV2"),cachedTime=parseInt(localStorage.getItem("mflPoolTimeV2")||"0");
  if(cached&&(Date.now()-cachedTime)<86400000){ mflPlayers=JSON.parse(cached); }
  else{
    document.getElementById("pool-status").textContent="Fetching player pool from MFL…";
    try{
      const d=await mfl("www47","52453","players","2026");
      const raw=toArr(d?.players?.player);
      if(raw.length>100){ mflPlayers=raw.filter(p=>["QB","RB","WR","TE"].includes(p.position)); localStorage.setItem("mflPoolV2",JSON.stringify(mflPlayers)); localStorage.setItem("mflPoolTimeV2",Date.now().toString()); }
    }catch(e){ document.getElementById("pool-status").textContent="Could not load pool: "+e.message; return; }
  }
  mflPlayers.forEach(p=>{ if(!p.name||!p.id)return; nameToId[norm(p.name)]=p.id; nameToId[norm(displayName(p.name))]=p.id; });
  const ts=new Date(parseInt(localStorage.getItem("mflPoolTimeV2")||Date.now()));
  document.getElementById("pool-status").textContent=`${mflPlayers.length.toLocaleString()} players · pool updated ${ts.toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"})}`;
  buildTeamFilter(); renderList();
}

// ── Roster helpers ─────────────────────────────────────────────────────────────
function loadCachedRosters(){
  const data=JSON.parse(localStorage.getItem("leagueRostersData")||"null"); if(!data)return null;
  const result={};
  LEAGUES.forEach(cfg=>{
    const rs=data[cfg.id];
    if(!rs)result[cfg.id]=null;
    else if(rs.twoCopy)result[cfg.id]={mineCount:rs.mineCount,otherCount:rs.otherCount,nwoOwners:rs.nwoOwners||{},tradeBait:new Set(rs.tradeBait||[]),twoCopy:true};
    else result[cfg.id]={mine:new Set(rs.mine),other:new Set(rs.other),owners:rs.owners||{},tradeBait:new Set(rs.tradeBait||[])};
  });
  return result;
}
function computePlayerStatus(name){
  const pid=nameToId[norm(name)],rosters=loadCachedRosters(); if(!rosters||!pid)return null;
  const ls={};
  LEAGUES.forEach(cfg=>{
    const rs=rosters[cfg.id];
    if(!rs)ls[cfg.id]=cfg.twoCopy?["error","error"]:"error";
    else if(cfg.twoCopy)ls[cfg.id]=twoCopyStatuses(rs.mineCount[pid]||0,rs.otherCount[pid]||0,rs.tradeBait,pid);
    else{ if(rs.mine.has(String(pid)))ls[cfg.id]="mine"; else if(rs.other.has(String(pid)))ls[cfg.id]=rs.tradeBait?.has(String(pid))?"tradeblock":"taken"; else ls[cfg.id]="available"; }
  });
  return ls;
}

// ── Refresh ────────────────────────────────────────────────────────────────────
function forceRefresh(){
  localStorage.removeItem("lrTime");
  doRefresh();
}
async function doRefresh(){
  const rosterErrors=[],newNames={},leagueRosters={};

  for(const cfg of LEAGUES){
    let fetched=false;
    for(const year of ["2026","2025"]){
      try{
        const rData=await mfl(cfg.server,cfg.id,"rosters",year);
        let myFranchiseId=null;
        const frNames={};  // id → name for this league
        try{
          const lg=await mfl(cfg.server,cfg.id,"league",year);
          newNames[cfg.id]=lg?.league?.name||cfg.id;
          const frs=toArr(lg?.league?.franchises?.franchise);
          frs.forEach(fr=>{ frNames[fr.id]=stripHtml(fr.name); });
          const matchName=MY_TEAM_MATCH[cfg.id]||MY_TEAM_NAMES[cfg.id]||"";
          const myFr=frs.find(fr=>norm(fr.name)===norm(matchName));
          myFranchiseId=myFr?.id||null;
        }catch{newNames[cfg.id]=cfg.id;}

        const allFr=toArr(rData?.rosters?.franchise);

        if(cfg.twoCopy){
          const mineCount={},otherCount={},nwoOwners={};
          allFr.forEach(fr=>{
            const isMe=myFranchiseId&&fr.id===myFranchiseId;
            const frName=frNames[fr.id]||"";
            toArr(fr.player).forEach(p=>{
              if(isMe){ mineCount[p.id]=(mineCount[p.id]||0)+1; }
              else{
                otherCount[p.id]=(otherCount[p.id]||0)+1;
                if(frName){ if(!nwoOwners[p.id])nwoOwners[p.id]=[]; nwoOwners[p.id].push(frName); }
              }
            });
          });
          leagueRosters[cfg.id]={mineCount,otherCount,nwoOwners,tradeBait:new Set(),twoCopy:true};
        }else{
          const mine=new Set(),other=new Set(),owners={};
          allFr.forEach(fr=>{
            const isMe=myFranchiseId&&fr.id===myFranchiseId;
            const frName=frNames[fr.id]||"";
            toArr(fr.player).forEach(p=>{
              isMe?mine.add(p.id):other.add(p.id);
              if(!isMe&&frName) owners[p.id]=frName;
            });
          });
          leagueRosters[cfg.id]={mine,other,owners,tradeBait:new Set()};
        }
        // Fetch trade bait — APIKEY (preferred) or mflUserInfo cookie
        const _tbKey=mflApiKeys[cfg.id];
        if(_tbKey||mflUserInfo){
          try{
            const _tbExtra=_tbKey?{APIKEY:_tbKey}:{USERINFO:mflUserInfo};
            const tbData=await mfl("api",cfg.id,"tradeBait",year,_tbExtra);
            const tb=leagueRosters[cfg.id].tradeBait;
            toArr(tbData?.tradeBaits?.tradeBait).forEach(item=>{
              if(item.franchise_id===myFranchiseId)return;
              toArr(item?.players?.player).forEach(p=>{
                const raw=typeof p==="object"?(p?.id??p?.player_id):p;
                const pid=raw!=null?String(raw):null;
                if(pid)tb.add(pid);
              });
            });
          }catch(e){
            if(mflUserInfo&&/expired|invalid|session/i.test(e.message)){
              mflUserInfo=null;localStorage.removeItem("mflUserInfo");updateMFLBtn();
            }
          }
        }
        fetched=true;break;
      }catch(e){ rosterErrors.push(cfg.id+"/"+year+": "+e.message); leagueRosters[cfg.id]=null; }
    }
    if(!fetched){newNames[cfg.id]=cfg.id;leagueRosters[cfg.id]=null;}
  }

  leagueNames=newNames;
  const rfs={};
  LEAGUES.forEach(cfg=>{
    const rs=leagueRosters[cfg.id];
    if(!rs)rfs[cfg.id]=null;
    else if(cfg.twoCopy)rfs[cfg.id]={mineCount:rs.mineCount,otherCount:rs.otherCount,nwoOwners:rs.nwoOwners,tradeBait:[...rs.tradeBait||[]],twoCopy:true};
    else rfs[cfg.id]={mine:[...rs.mine],other:[...rs.other],owners:rs.owners,tradeBait:[...rs.tradeBait||[]]};
  });
  localStorage.setItem("leagueRostersData",JSON.stringify(rfs));

  const statusMap={};
  watchlist.forEach(player=>{
    const pid=nameToId[norm(player.name)]; const ls={};
    LEAGUES.forEach(cfg=>{
      const rs=leagueRosters[cfg.id];
      if(!rs)ls[cfg.id]=cfg.twoCopy?["error","error"]:"error";
      else if(!pid)ls[cfg.id]=cfg.twoCopy?["unknown","unknown"]:"unknown";
      else if(cfg.twoCopy)ls[cfg.id]=twoCopyStatuses(rs.mineCount[pid]||0,rs.otherCount[pid]||0,rs.tradeBait,pid);
      else{ if(rs.mine.has(String(pid)))ls[cfg.id]="mine"; else if(rs.other.has(String(pid)))ls[cfg.id]=rs.tradeBait?.has(String(pid))?"tradeblock":"taken"; else ls[cfg.id]="available"; }
    }); statusMap[norm(player.name)]=ls;
  });
  playerStatus=statusMap;

  const now=new Date();
  lastRefresh=now.toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"});
  localStorage.setItem("ps",JSON.stringify(playerStatus)); localStorage.setItem("ln",JSON.stringify(leagueNames)); localStorage.setItem("lr",lastRefresh); localStorage.setItem("lrTime",Date.now().toString());
  const loaded=Object.values(leagueRosters).filter(r=>r!==null).length;
  const ownerCount=Object.values(leagueRosters).reduce((sum,rs)=>{
    if(!rs)return sum;
    if(rs.twoCopy)return sum+Object.keys(rs.nwoOwners||{}).length;
    return sum+Object.keys(rs.owners||{}).length;
  },0);
  renderLeagueKey();renderList();
}

  const multi=csCfg[key]?.multi;
  const filtered=opts.filter(o=>!o.val||!q||o.label.toLowerCase().includes(q));
  const searchBox=`<div class="cs-search-wrap" onclick="event.stopPropagation()"><input class="cs-search-input" type="text" placeholder="Search..." value="${csQ[key]||""}" oninput="csQUpdate('${key}',this.value)" onkeydown="event.stopPropagation()"></div>`;
  if(multi){
    const sel=fv[key];
    const allVals=opts.filter(o=>o.val).map(o=>o.val);
    const allOn=allVals.length>0&&allVals.every(v=>sel.has(v));
    const someOn=sel.size>0&&!allOn;
    const rows=filtered.map(o=>{
      if(!o.val)return`<div class="cs-opt cs-selall" onclick="csToggleAll('${key}')"><span class="cs-chk">${allOn?"☑":someOn?"⊡":"☐"}</span>Select All</div>`;
      const on=sel.has(o.val);
      return`<div class="cs-opt${on?" active":""}" data-val="${o.val}" onclick="csToggleOpt('${key}','${o.val.replace(/'/g,"\'")}')"><span class="cs-chk">${on?"☑":"☐"}</span>${o.label}</div>`;
    }).join("");
    list.innerHTML=searchBox+rows;
  }else{
    const cur=fv[key];
    const rows=filtered.map(o=>
      `<div class="cs-opt${o.val===cur?" active":""}" data-val="${o.val}" onclick="csSelect(this,'${key}','${o.val.replace(/'/g,"\'")}')"><span class="cs-chk">${o.val===cur?"✓":""}</span>${o.label}</div>`
    ).join("");
    list.innerHTML=searchBox+rows;
  }
  if(_panelKey===key)csRefreshPanel(key);
}

function csQUpdate(key,val){csQ[key]=val;csRender(key);}

function csSelect(el,key,val){
  fv[key]=val;
  csQ[key]="";
  closePanel();
  csUpdateBtn(key);csRender(key);
  renderList();
}
function csToggleOpt(key,val){
  const sel=fv[key];
  sel.has(val)?sel.delete(val):sel.add(val);
  csUpdateBtn(key);csRender(key);
  if(key==="format")buildLeagueFilter();
  renderList();
}
function csToggleAll(key){
  const sel=fv[key];
  const allVals=(csData[key]||[]).filter(o=>o.val).map(o=>o.val);
  if(allVals.every(v=>sel.has(v)))sel.clear();
  else allVals.forEach(v=>sel.add(v));
  csUpdateBtn(key);csRender(key);
  if(key==="format")buildLeagueFilter();
  renderList();
}
function csUpdateBtn(key){
  const btn=document.querySelector("#csf-"+key+" .cs-btn");
  if(!btn)return;
  const multi=csCfg[key]?.multi;
  if(multi){
    const n=fv[key].size;
    btn.classList.toggle("has-val",n>0);
    let badge=btn.querySelector(".cs-badge");
    if(n>0){if(!badge){badge=document.createElement("span");badge.className="cs-badge";btn.insertBefore(badge,btn.querySelector(".cs-arr"));}badge.textContent=n;}
    else if(badge)badge.remove();
  }else{
    btn.classList.toggle("has-val",fv[key]!==""&&key!=="sort");
  }
}
function csOptions(key,opts){
  csData[key]=opts;csRender(key);
}

function buildFormatFilter(){
  const formats=[...new Set(LEAGUES.map(c=>c.label))];
  csOptions("format",[{val:"",label:"Select All"},...formats.map(f=>({val:f,label:f}))]);
}
function buildLeagueFilter(){
  const pool=fv.format.size>0?LEAGUES.filter(c=>fv.format.has(c.label)):LEAGUES;
  const validNums=new Set(pool.map(c=>String(LEAGUES.indexOf(c)+1)));
  fv.league.forEach(n=>{if(!validNums.has(n))fv.league.delete(n);});
  csOptions("league",[{val:"",label:"Select All"},...pool.map(c=>{
    const num=LEAGUES.indexOf(c)+1;
    return{val:String(num),label:`[${num}] ${MY_TEAM_NAMES[c.id]||c.id}`};
  })]);
}
function buildTeamFilter(){
  const teams=new Set(); watchlist.forEach(p=>{const m=getPlayerMeta(p.name);if(m?.team)teams.add(m.team);});
  csOptions("nflteam",[{val:"",label:"Select All"},...[...teams].sort().map(t=>({val:t,label:t}))]);
}

function buildNameDropdown(){
  const sorted=[...watchlist].sort((a,b)=>sortKey(a.name).localeCompare(sortKey(b.name)));
  csOptions("name",[{val:"",label:"Select All"},...sorted.map(p=>({val:norm(p.name),label:p.name}))]);
}

let allExpanded=false;
function applyExpandAll(){
  document.querySelectorAll("#player-list [id^='owners-']").forEach(el=>el.style.display="contents");
  document.querySelectorAll("#player-list [id^='owntoggle-']").forEach(b=>b.classList.add("open"));
  const chk=document.getElementById("expand-all-toggle");
  if(chk)chk.checked=true;
  const lbl=document.querySelector(".expand-toggle-label .toggle-text");
  if(lbl)lbl.textContent="Collapse";
}
function toggleAllOwners(){
  const chk=document.getElementById("expand-all-toggle");
  allExpanded=chk?chk.checked:!allExpanded;
  const lbl=document.querySelector(".expand-toggle-label .toggle-text");
  if(allExpanded){
    applyExpandAll();
    if(lbl)lbl.textContent="Collapse";
  }else{
    document.querySelectorAll("#player-list [id^='owners-']").forEach(el=>el.style.display="none");
    document.querySelectorAll("#player-list [id^='owntoggle-']").forEach(b=>b.classList.remove("open"));
    if(lbl)lbl.textContent="Expand";
  }
}

function renderList(){
  const sortV=fv.sort||"az";
  const el=document.getElementById("player-list");
  const rosters=loadCachedRosters();

  let rows=watchlist.map((p,i)=>({...p,i})).filter(p=>{
    if(fv.name.size>0&&!fv.name.has(norm(p.name)))return false;
    if(fv.pos.size>0&&!fv.pos.has(p.pos))return false;
    if(fv.nflteam.size>0){const m=getPlayerMeta(p.name);if(!fv.nflteam.has(m?.team||""))return false;}
    if(fv.status.size>0){
      const st=playerStatus[norm(p.name)]||{};
      let cfgs;
      if(fv.league.size>0) cfgs=[...fv.league].map(n=>LEAGUES[parseInt(n)-1]).filter(Boolean);
      else if(fv.format.size>0) cfgs=LEAGUES.filter(c=>fv.format.has(c.label));
      else cfgs=LEAGUES;
      const vals=cfgs.flatMap(c=>{const s=st[c.id];return Array.isArray(s)?s:[s];});
      if(!vals.some(v=>fv.status.has(v)))return false;
    }
    return true;
  });

  // Sort
  if(sortV==="rookies") rows=rows.filter(p=>isRookie(p.name));
  rows.sort((a,b)=>sortV==="za"
    ?sortKey(b.name).localeCompare(sortKey(a.name))
    :sortKey(a.name).localeCompare(sortKey(b.name)));

  document.getElementById("subtitle").textContent=watchlist.length+" players · 6 leagues";
  renderLeagueKey();
  const anyFilter=fv.name.size>0||fv.pos.size>0||fv.nflteam.size>0||fv.status.size>0||fv.format.size>0||fv.league.size>0;
  document.getElementById("clear-filters-btn").style.display=anyFilter?"inline":"none";
  if(!rows.length){
    if(!watchlist.length){
      el.innerHTML=`<div style="padding:20px 0;display:flex;flex-direction:column;gap:10px;">
        <p style="color:var(--dim);font-size:13px;">Your watchlist is empty — history has no saved snapshots.</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button onclick="toggleHistory()" style="background:none;border:1px solid var(--border);color:var(--dim);padding:7px 14px;border-radius:5px;font-family:var(--font);font-size:12px;cursor:pointer;">&#9733; Open History</button>
          <button onclick="resetToDefaults()" style="background:none;border:1px solid var(--blue);color:var(--blue);padding:7px 14px;border-radius:5px;font-family:var(--font);font-size:12px;cursor:pointer;">&#8635; Reset to default (29 players)</button>
        </div>
      </div>`;
    } else {
      el.innerHTML='<p class="no-results">No players match.</p>';
    }
    return;
  }

  const dimColor="#374151";
  // Which league IDs are "in scope" for the current Format/League filter
  const scopeIds=(()=>{
    if(fv.league.size>0)return new Set([...fv.league].map(n=>LEAGUES[parseInt(n)-1]?.id).filter(Boolean));
    if(fv.format.size>0)return new Set(LEAGUES.filter(c=>fv.format.has(c.label)).map(c=>c.id));
    return null; // all in scope
  })();
  const effStatus=(cfg,s)=>{return typeof s==="string"?s:"unknown";};
  const shouldDim=(cfg,sv)=>{
    if(fv.status.size>0&&!fv.status.has(sv))return true;
    if(scopeIds!==null&&!scopeIds.has(cfg.id))return true;
    return false;
  };
  const makeIcon=(cfg,s)=>{
    const num=LEAGUES.indexOf(cfg)+1,ln=MY_TEAM_NAMES[cfg.id]||cfg.id;
    const sv=effStatus(cfg,s);
    const bg=shouldDim(cfg,sv)?dimColor:iconColor(sv);
    return`<span class="league-icon" style="background:${bg}" title="[${num}] ${ln} — ${iconLabel(sv)}">${num}</span>`;
  };
  const makeNwoIcon=(cfg,s)=>{
    const num=LEAGUES.indexOf(cfg)+1,ln=MY_TEAM_NAMES[cfg.id]||cfg.id;
    const st=Array.isArray(s)?s:["unknown","unknown"];
    return`<span class="nwo-oval">${st.map((si,k)=>{
      const sv=effStatus(cfg,si);
      const bg=shouldDim(cfg,sv)?dimColor:iconColor(sv);
      return`<span class="league-icon" style="background:${bg}" title="[${num}] ${ln} — Copy ${k+1}: ${iconLabel(sv)}">${num}</span>`;
    }).join("")}</span>`;
  };

  // Build "> Team Name" lines for a group of leagues — only when someone else owns the player
  const buildStatusLines=(status,pid)=>{
    const lineFor=(cfg)=>{
      const num=LEAGUES.indexOf(cfg)+1;
      const numStr=String(num);
      const hl=fv.league.size>0?fv.league.has(numStr):fv.format.size>0?fv.format.has(cfg.label):false;
      const cls="owner-line"+(hl?" hl":"");
      if(cfg.twoCopy){
        const st=Array.isArray(status[cfg.id])?status[cfg.id]:["unknown","unknown"];
        const rawOwners=(rosters&&pid)?rosters[cfg.id]?.nwoOwners?.[pid]||[]:[];
        let ti=0;
        const parts=st.map(s=>{
          if(s==="taken"){ const n=rawOwners[ti++]||""; return n||"Rostered"; }
          if(s==="tradeblock"){ const n=rawOwners[ti++]||""; return (n?n+" · ":"")+"Trade Block"; }
          return s==="mine"?"My Team":s==="available"?"Available":"Unknown";
        });
        return`<div class="${cls}">[${num}] ${parts.join(" & ")}</div>`;
      }else{
        const sv=typeof status[cfg.id]==="string"?status[cfg.id]:"unknown";
        let d;
        if(sv==="taken"){ const n=(rosters&&pid)?rosters[cfg.id]?.owners?.[pid]||"":""; d=n||"Rostered"; }
        else if(sv==="tradeblock"){ const n=(rosters&&pid)?rosters[cfg.id]?.owners?.[pid]||"":""; d=(n?n+" · ":"")+"Trade Block"; }
        else if(sv==="mine") d="My Team";
        else if(sv==="available") d="Available";
        else d="Unknown";
        return`<div class="${cls}">[${num}] ${d}</div>`;
      }
    };
    const sfLines  =LEAGUES.filter(c=>c.label==="SF"   ).map(lineFor).join("");
    const sfteLines=LEAGUES.filter(c=>c.label==="SF/TE+").map(lineFor).join("");
    return`<div class="avail-grid">
      <div class="avail-col">${sfLines}</div>
      <div class="avail-col">${sfteLines}</div>
    </div>`;
  };

  el.innerHTML=rows.map(({name,pos,i})=>{
    const status=playerStatus[norm(name)]||{};
    const meta=getPlayerMeta(name);
    const team=meta?.team||"";
    const rookie=isRookie(name);
    const pid=nameToId[norm(name)];
    const sfIcons  =LEAGUES.filter(c=>c.label==="SF").map(c=>makeIcon(c,status[c.id])).join("");
    const sfteIcons=LEAGUES.filter(c=>c.label==="SF/TE+").map(c=>c.twoCopy?makeNwoIcon(c,status[c.id]):makeIcon(c,status[c.id])).join("");
    const allStatuses=buildStatusLines(status,pid);

    return`<div class="player-row">
      <div class="player-name-row">
        <button class="owner-toggle" id="owntoggle-${i}" onclick="toggleOwners(${i})">▶</button>
        <span class="player-name">${name}</span>
        <span class="player-pos">${pos}</span>
        ${team?`<span class="player-team">${team}</span>`:""}
        ${rookie?'<span class="rookie-badge">R</span>':""}
        <button class="remove-btn" onclick="removePlayer(${i})">×</button>
      </div>
      <span class="player-section-label">Status</span>
      <div class="icon-row-group">
        <div class="icon-row-line"><span class="row-label">SF</span>${sfIcons}</div>
        <div class="icon-row-line"><span class="row-label">SF/TE+</span>${sfteIcons}</div>
      </div>
      <div id="owners-${i}" style="display:none">${allStatuses}</div>
    </div>`;
  }).join("");
  if(allExpanded)applyExpandAll();
}

function removePlayer(i){
  const name=watchlist[i]?.name||"Player";
  recordChange(); watchlist=watchlist.filter((_,j)=>j!==i);
  localStorage.setItem("wl",JSON.stringify(watchlist));
  saveHistory("Removed "+name);
  buildNameDropdown();buildTeamFilter();renderList();
}

// timestamp set by refresh block below
document.getElementById("app-version").textContent="v"+APP_VERSION;
renderLeagueKey();
updateMFLBtn();
csOptions("pos",[{val:"",label:"Select All"},{val:"QB",label:"QB"},{val:"RB",label:"RB"},{val:"WR",label:"WR"},{val:"TE",label:"TE"}]);
csOptions("status",[{val:"",label:"Select All"},{val:"available",label:"Available"},{val:"mine",label:"My Team"},{val:"tradeblock",label:"Trade Block"},{val:"taken",label:"Rostered"}]);
csOptions("sort",[{val:"az",label:"A to Z"},{val:"za",label:"Z to A"},{val:"rookies",label:"Rookies Only"}]);
buildNameDropdown();buildFormatFilter();buildLeagueFilter();buildTeamFilter();renderList();renderHistory();_dbgUpdate();
// Refresh rosters on load unless refreshed within the last 5 minutes
const _lrTime=parseInt(localStorage.getItem("lrTime")||"0");
const _stale=!_lrTime||Date.now()-_lrTime>300000;
if(_stale){doRefresh();}else{document.getElementById("timestamp").textContent="Updated "+lastRefresh;}
loadPlayerPool();
</script>

<div id="mfl-keys-panel">
  <h4>MFL API KEYS</h4>
  <p class="keys-instructions">Find each key: log into your league on MFL → Help → Developer's API</p>
  <div id="mfl-keys-body"></div>
  <button class="keys-save" onclick="saveMflKeys()">Save Keys</button>
</div>
<div id="debug-ticker"><span class="dt-val">loading…</span></div>
</body>
