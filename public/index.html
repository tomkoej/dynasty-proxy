<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty Watchlist</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --surface:#161b22; --border:#30363d; --dim:#6b7280;
      --muted:#374151; --text:#e5e5e5; --green:#16a34a; --green-hi:#22c55e;
      --blue:#2563eb; --red:#dc2626;
      --font:"SF Mono","Fira Code","Cascadia Code",Consolas,monospace;
    }
    html, body { height:100%; background:#0d1117; }
    body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; display:flex; flex-direction:column; }
    #page-wrap   { display:flex; flex-direction:column; height:100vh; background:#0d1117; }
    #frozen-top  { flex-shrink:0; background:var(--bg); }
    #filter-panel { display:none; position:fixed; z-index:9999; background:var(--surface); border:1px solid var(--border); border-radius:6px; max-height:220px; overflow-y:auto; box-shadow:0 4px 16px rgba(0,0,0,.5); }
    #scroll-list { flex:1; overflow-y:auto; min-height:0; background:#0d1117; overscroll-behavior:none; }
    #list-inner  { max-width:680px; margin:0 auto; padding:16px 24px 60px; }

    #header {
      display:flex; justify-content:space-between; align-items:flex-start;
      padding:16px 24px; border-bottom:1px solid var(--border); background:var(--surface);
    }
    #header h1 { font-size:18px; font-weight:700; }
    #header h1 span { color:var(--green-hi); }
    #header p  { color:var(--dim); font-size:12px; margin-top:3px; }
    #header-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }
    #header-btns  { display:flex; gap:6px; align-items:center; }
    .hdr-btn {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:6px 12px; border-radius:6px; font-family:var(--font); font-size:13px;
      cursor:pointer; transition:border-color .15s; white-space:nowrap;
    }
    .hdr-btn:hover:not(:disabled) { border-color:var(--green); }
    .hdr-btn:disabled { opacity:.4; cursor:default; }
    #timestamp { color:#fff; font-size:11px; }
    #debug     { color:var(--muted); font-size:10px; }

    #main { max-width:680px; margin:0 auto; padding:20px 24px 0; }
    .sec-label { color:var(--dim); font-size:11px; display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:.04em; }
    .section-divider { border:none; border-top:1px solid var(--border); margin:18px 0; }

    #add-section { margin-bottom:20px; position:relative; }
    #add-search {
      width:100%; background:var(--surface); border:1px solid var(--border);
      color:var(--text); padding:9px 14px; border-radius:6px; font-family:var(--font); font-size:14px;
    }
    #add-search:focus { outline:none; border-color:var(--green); }
    #add-search::placeholder { color:var(--muted); }
    #pool-status { color:var(--dim); font-size:11px; margin-top:5px; }
    #add-results {
      position:absolute; top:calc(100% - 26px); left:0; right:0;
      background:var(--surface); border:1px solid var(--border); border-top:none;
      border-radius:0 0 6px 6px; overflow-y:auto; z-index:100; display:none; max-height:260px;
    }
    .add-result { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; cursor:pointer; gap:8px; }
    .add-result:hover { background:var(--muted); }
    .add-result-name { color:var(--text); }
    .add-result-meta { color:var(--dim); font-size:12px; }
    .add-result.already { opacity:.4; cursor:default; }

    #filter-section { margin-bottom:16px; }
    .filter-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .filter-header .sec-label { margin-bottom:0; }
    .clear-btn { background:none; border:none; color:var(--dim); font-family:var(--font); font-size:11px; cursor:pointer; padding:0; }
    .clear-btn:hover { color:var(--text); text-decoration:underline; }
    #filter-bar { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-btn {
      background:var(--surface); border:1px solid var(--border); color:var(--text);
      padding:7px 10px; border-radius:6px; font-family:var(--font); font-size:13px;
      cursor:pointer; display:flex; align-items:center; gap:5px; white-space:nowrap;
    }
    .filter-btn:hover { border-color:var(--dim); }
    .filter-btn.active { border-color:var(--green); }
    .fb-badge { background:var(--green); color:white; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
    #filter-panel {
      display:none; position:fixed; z-index:9999;
      background:var(--surface); border:1px solid var(--border); border-radius:8px;
      box-shadow:0 6px 20px rgba(0,0,0,.6); min-width:220px; max-width:320px;
    }
    #fp-search-wrap { padding:10px 12px 6px; border-bottom:1px solid var(--border); }
    #fp-search {
      width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
      padding:6px 10px; border-radius:4px; font-family:var(--font); font-size:12px; outline:none;
    }
    #fp-search:focus { border-color:var(--green); }
    #fp-opts { max-height:200px; overflow-y:auto; padding:4px 0; }
    .fp-item { display:flex; align-items:center; gap:10px; padding:7px 14px; cursor:pointer; }
    .fp-item:hover { background:var(--muted); }
    .fp-item input[type="checkbox"] { accent-color:var(--green); width:14px; height:14px; flex-shrink:0; cursor:pointer; }
    .fp-item label { color:var(--text); font-size:13px; cursor:pointer; user-select:none; }
    .cs-opt {
      padding:8px 12px; cursor:pointer; font-size:13px; color:var(--text);
      white-space:nowrap;
    }
    .cs-opt:hover { background:var(--muted); }
    .cs-opt.active .cs-chk { color:var(--green-hi); }
    .cs-opt.active { color:var(--text); }
    .cs-chk  { display:inline-block; width:16px; color:var(--dim); font-size:11px; flex-shrink:0; }
    .cs-search-wrap { padding:8px 10px 4px; border-bottom:1px solid var(--border); }
    .cs-search-input {
      width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
      padding:5px 8px; border-radius:4px; font-family:var(--font); font-size:12px; outline:none;
    }
    .cs-search-input:focus { border-color:var(--green); }
    .cs-badge {
      background:var(--green); color:white; font-size:10px; font-weight:700;
      padding:1px 6px; border-radius:10px; margin-right:2px; flex-shrink:0;
    }

    #legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:10px; }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot  { width:11px; height:11px; border-radius:50%; border:1px solid var(--border); flex-shrink:0; }
    .legend-label { color:var(--dim); font-size:12px; }

    #league-key { color:var(--muted); font-size:11px; margin-bottom:20px; line-height:2; }
    .league-group { margin-bottom:2px; }
    .league-group-label { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.04em; margin-right:6px; }

    /* Player rows */
    .player-row { margin-bottom:0; padding:16px 0 14px; border-bottom:1px solid var(--border); }
    .player-name-row { display:flex; align-items:center; gap:8px; }
    .remove-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--font); font-size:14px; padding:0 2px; line-height:1; flex-shrink:0; margin-left:auto; }
    .remove-btn:hover { color:var(--red); }
    .player-name { color:var(--text); }
    .player-pos  { color:var(--text); font-size:14px; }
    .player-team { color:var(--text); font-size:14px; }
    .rookie-badge { background:#d97706; color:#fff; font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; flex-shrink:0; }

    /* Icon rows */
    .icon-row-group { margin-top:0; padding-left:36px; display:flex; flex-direction:column; gap:5px; }
    .icon-row-line  { display:flex; align-items:center; gap:5px; }
    .row-label { color:#fff; font-size:10px; min-width:42px; }
    .league-icon {
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; border-radius:50%; color:white;
      font-size:10px; font-weight:700; border:1px solid var(--border); cursor:default; flex-shrink:0;
    }
    .nwo-oval { display:inline-flex; gap:3px; align-items:center; border:1px solid rgba(255,255,255,0.2); border-radius:14px; padding:1px 5px; }
    .owner-toggle { background:none; border:none; color:var(--dim); cursor:pointer; font-family:var(--font); font-size:10px; padding:0; line-height:1; flex-shrink:0; width:16px; text-align:center; transition:transform .15s; display:inline-block; }
    .owner-toggle:hover { color:var(--text); }
    .owner-toggle.open { transform:rotate(90deg); }
    .owner-toggle-ph { width:16px; flex-shrink:0; display:inline-block; }
    .player-section-label { color:var(--dim); font-size:9px; text-transform:uppercase; letter-spacing:.05em; padding-left:24px; display:block; margin:5px 0 4px; }
    .avail-grid      { display:flex; gap:20px; padding-left:36px; margin-top:3px; }
    .avail-col       { display:flex; flex-direction:column; gap:2px; }
    .avail-col-label { color:#fff; font-size:10px; margin-bottom:4px; }
    .owner-line      { color:var(--dim); font-size:11px; line-height:1.6; }

    .no-results { color:var(--dim); font-size:13px; padding:8px 0; }

    #history-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:8px; padding:14px; margin-bottom:20px; display:none;
    }
    #history-panel h3 { font-size:13px; font-weight:600; margin-bottom:10px; color:var(--text); }
    .history-entry { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--muted); gap:10px; }
    .history-entry:last-child { border-bottom:none; }
    .history-meta { display:flex; flex-direction:column; gap:2px; }
    .history-time { color:var(--dim); font-size:11px; }
    .history-desc { color:var(--text); font-size:13px; }
    .revert-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:4px 10px; border-radius:4px; font-family:var(--font); font-size:11px; cursor:pointer; white-space:nowrap; flex-shrink:0; }
    .revert-btn:hover { border-color:var(--green); color:var(--text); }
    .history-empty { color:var(--dim); font-size:13px; }
  </style>
</head>
<body>
<div id="page-wrap">
<div id="frozen-top">
<div id="header">
  <div>
    <h1>🏈 <span>Dynasty</span> Watchlist</h1>
    <p id="subtitle">—</p>
  </div>
  <div id="header-right">
    <div id="header-btns">
      <button class="hdr-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
      <button class="hdr-btn" id="redo-btn" onclick="redo()" disabled>↪ Redo</button>
      <button class="hdr-btn" onclick="toggleHistory()">🕐 History</button>
      <button class="hdr-btn" id="refresh-btn" onclick="doRefresh()">↻ Refresh</button>
    </div>
    <div id="timestamp">Not yet refreshed</div>
    <div id="debug"></div>
  </div>
</div>

<div id="main">
  <div id="add-section">
    <input id="add-search" type="text" placeholder="Search by name" autocomplete="off"
      oninput="onAddInput()" onfocus="onAddInput()" onblur="hideResultsDelayed()">
    <div id="add-results"></div>
    <div id="pool-status">Loading player pool…</div>
  </div>

  <hr class="section-divider">

  <div id="history-panel">
    <h3>Watchlist History</h3>
    <div id="history-list"></div>
  </div>

  <div id="filter-section">
    <div class="filter-header">
      <span class="sec-label">Filter &amp; sort</span>
      <button id="clear-filters-btn" class="clear-btn" onclick="clearFilters()" style="display:none">Clear all</button>
    </div>
    <div id="filter-bar">
      <button class="filter-btn" id="fb-name"    onclick="openFilter(this,'name')">Players</button>
      <button class="filter-btn" id="fb-pos"     onclick="openFilter(this,'pos')">Position</button>
      <button class="filter-btn" id="fb-nflteam" onclick="openFilter(this,'nflteam')">NFL Team</button>
      <button class="filter-btn" id="fb-status"  onclick="openFilter(this,'status')">Status</button>
      <button class="filter-btn" id="fb-format"  onclick="openFilter(this,'format')">Format</button>
      <button class="filter-btn" id="fb-league"  onclick="openFilter(this,'league')">League</button>
      <button class="filter-btn" id="fb-sort"    onclick="openFilter(this,'sort')">Sort</button>
    </div>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a"></div><span class="legend-label">Available</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div><span class="legend-label">My Team</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div><span class="legend-label">Rostered</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div><span class="legend-label">Unknown</span></div>
    <div class="legend-item"><span class="rookie-badge">R</span><span class="legend-label">Rookie</span></div>
  </div>

  <div id="league-key"></div>
</div>
</div>
<div id="filter-panel-outer" onclick="event.stopPropagation()"><div id="filter-panel"></div></div>
<div id="scroll-list">
  <div id="list-inner">
    <div id="player-list"></div>
  </div>
</div>
</div>

<script>
const LEAGUES = [
  { server:"www42", id:"71526",               label:"SF"     },
  { server:"www47", id:"13133",               label:"SF"     },
  { server:"www47", id:"52453",               label:"SF/TE+" },
  { server:"www48", id:"68291",               label:"SF/TE+" },
  { server:"www47", id:"69382",               label:"SF/TE+" },
  { server:"www47", id:"64818", twoCopy:true, label:"SF/TE+" },
];
const MY_TEAM_NAMES = {
  "71526":"QC at the Kratom Factory","13133":"Mediocre Morsov",
  "52453":"Cleon LIX","68291":"The Undertaker","69382":"Shotgun Shai-Hulud",
  "64818":"The Undertaker (nWo)",
};
const MY_TEAM_MATCH = { "64818":"The Undertaker" };
const DEFAULT_WATCHLIST = [
  {name:"Brandon Aiyuk",pos:"WR"},{name:"Erick All",pos:"TE"},{name:"Cyrus Allen",pos:"WR"},
  {name:"LeQuint Allen",pos:"RB"},{name:"Tyson Bagent",pos:"QB"},{name:"Malik Benson",pos:"WR"},
  {name:"Nate Boerkircher",pos:"TE"},{name:"Isaiah Bond",pos:"WR"},{name:"Deion Burks",pos:"WR"},
  {name:"Keon Coleman",pos:"WR"},{name:"Mitchell Evans",pos:"TE"},{name:"Ryan Flournoy",pos:"WR"},
  {name:"Theo Johnson",pos:"TE"},{name:"Cole Kmet",pos:"TE"},{name:"Charlie Kolar",pos:"TE"},
  {name:"Bryce Lance",pos:"WR"},{name:"Kendre Miller",pos:"RB"},{name:"Jalen Milroe",pos:"QB"},
  {name:"Joe Mixon",pos:"RB"},{name:"Tyren Montgomery",pos:"WR"},{name:"Devin Neal",pos:"RB"},
  {name:"Garrett Nussmeier",pos:"QB"},{name:"Adam Randall",pos:"RB"},{name:"Ja'Tavion Sanders",pos:"TE"},
  {name:"Brenen Thompson",pos:"WR"},{name:"Cedric Tillman",pos:"WR"},{name:"Darnell Washington",pos:"TE"},
  {name:"Deshaun Watson",pos:"QB"},{name:"Jordan Whittington",pos:"WR"},
];

let watchlist    = JSON.parse(localStorage.getItem("wl")||"null") || DEFAULT_WATCHLIST;
let playerStatus = JSON.parse(localStorage.getItem("ps")||"{}");
let leagueNames  = JSON.parse(localStorage.getItem("ln")||"{}");
let lastRefresh  = localStorage.getItem("lr")||null;
let mflPlayers   = [];
let nameToId     = {};
let undoStack=[], redoStack=[];
let history = JSON.parse(localStorage.getItem("wlHistory")||"[]");

const norm     = s=>(s||"").toLowerCase().replace(/[^a-z]/g,"");
const flipName = n=>{ const p=(n||"").trim().split(" "); return p.length<2?n:`${p[p.length-1]}, ${p.slice(0,-1).join(" ")}`; };
const sortKey  = n=>flipName(n).toLowerCase();
const toArr    = v=>!v?[]:Array.isArray(v)?v:[v];
const clone    = o=>JSON.parse(JSON.stringify(o));
const trunc    = (s,n=9)=>!s?"":s.length<=n?s:s.slice(0,n-1)+"…";
const stripHtml = s=>(s||"").replace(/<[^>]*>/g,"").trim();

function iconColor(s){return s==="available"?"#16a34a":s==="mine"?"#2563eb":s==="taken"?"#dc2626":"#f59e0b";}
function iconLabel(s){return s==="available"?"Available":s==="mine"?"My Team":s==="taken"?"Rostered":"Unknown";}
function isRookie(name){ const m=getPlayerMeta(name); return !!(m?.status==="R"||m?.rook==="1"); }

// ── History / Undo ─────────────────────────────────────────────────────────────
function recordChange(){ undoStack.push(clone(watchlist)); if(undoStack.length>100)undoStack.shift(); redoStack=[]; updateUndoRedoBtns(); }
function saveHistory(desc){ history.unshift({ts:Date.now(),desc,watchlist:clone(watchlist)}); if(history.length>30)history.pop(); localStorage.setItem("wlHistory",JSON.stringify(history)); renderHistory(); }
function undo(){ if(!undoStack.length)return; redoStack.push(clone(watchlist)); watchlist=undoStack.pop(); localStorage.setItem("wl",JSON.stringify(watchlist)); updateUndoRedoBtns(); buildNameDropdown();buildTeamFilter();renderList(); }
function redo(){ if(!redoStack.length)return; undoStack.push(clone(watchlist)); watchlist=redoStack.pop(); localStorage.setItem("wl",JSON.stringify(watchlist)); updateUndoRedoBtns(); buildNameDropdown();buildTeamFilter();renderList(); }
function revertToHistory(i){ recordChange(); watchlist=clone(history[i].watchlist); localStorage.setItem("wl",JSON.stringify(watchlist)); saveHistory("Reverted to: "+history[i].desc); buildNameDropdown();buildTeamFilter();renderList(); }
function updateUndoRedoBtns(){ document.getElementById("undo-btn").disabled=!undoStack.length; document.getElementById("redo-btn").disabled=!redoStack.length; }
function toggleHistory(){ const p=document.getElementById("history-panel"); p.style.display=p.style.display==="none"?"block":"none"; }
function renderHistory(){
  const el=document.getElementById("history-list");
  if(!history.length){el.innerHTML='<p class="history-empty">No history yet — changes auto-save here.</p>';return;}
  el.innerHTML=history.map((h,i)=>{
    const ts=new Date(h.ts).toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
    return`<div class="history-entry"><div class="history-meta"><span class="history-desc">${h.desc}</span><span class="history-time">${ts} · ${h.watchlist.length} players</span></div><button class="revert-btn" onclick="revertToHistory(${i})">Revert</button></div>`;
  }).join("");
}

// ── MFL API ───────────────────────────────────────────────────────────────────
async function mfl(server,leagueId,type,year="2026"){
  const p=new URLSearchParams({server,TYPE:type,year}); if(leagueId)p.set("L",leagueId);
  const r=await fetch(`/api/mfl?${p}`); if(!r.ok)throw new Error("HTTP "+r.status);
  const d=await r.json(); if(d?.error)throw new Error(d.error); return d;
}
function displayName(n){ const p=(n||"").split(", "); return p.length===2?p[1]+" "+p[0]:n; }
function getPlayerMeta(name){ const n=norm(name); return mflPlayers.find(p=>p.name&&(norm(p.name)===n||norm(displayName(p.name))===n)); }
function twoCopyStatuses(mc,oc){ const st=[]; for(let i=0;i<mc;i++)st.push("mine"); for(let i=0;i<oc;i++)st.push("taken"); while(st.length<2)st.push("available"); return st.slice(0,2); }

// ── Player Pool ───────────────────────────────────────────────────────────────
async function loadPlayerPool(){
  const cached=localStorage.getItem("mflPoolV2"),cachedTime=parseInt(localStorage.getItem("mflPoolTimeV2")||"0");
  if(cached&&(Date.now()-cachedTime)<86400000){ mflPlayers=JSON.parse(cached); }
  else{
    document.getElementById("pool-status").textContent="Fetching player pool from MFL…";
    try{
      const d=await mfl("www47","52453","players","2026");
      const raw=toArr(d?.players?.player);
      if(raw.length>100){ mflPlayers=raw.filter(p=>["QB","RB","WR","TE"].includes(p.position)); localStorage.setItem("mflPoolV2",JSON.stringify(mflPlayers)); localStorage.setItem("mflPoolTimeV2",Date.now().toString()); }
    }catch(e){ document.getElementById("pool-status").textContent="Could not load pool: "+e.message; return; }
  }
  mflPlayers.forEach(p=>{ if(!p.name||!p.id)return; nameToId[norm(p.name)]=p.id; nameToId[norm(displayName(p.name))]=p.id; });
  const ts=new Date(parseInt(localStorage.getItem("mflPoolTimeV2")||Date.now()));
  document.getElementById("pool-status").textContent=`${mflPlayers.length.toLocaleString()} players · pool updated ${ts.toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"})}`;
  buildTeamFilter(); renderList();
}

// ── Add Player ─────────────────────────────────────────────────────────────────
let addTimer;
function onAddInput(){clearTimeout(addTimer);addTimer=setTimeout(updateAddResults,120);}
function hideResultsDelayed(){setTimeout(()=>{document.getElementById("add-results").style.display="none";},200);}
function updateAddResults(){
  const q=norm(document.getElementById("add-search").value),box=document.getElementById("add-results");
  const inWl=new Set(watchlist.map(p=>norm(p.name)));
  if(!q||q.length<2){box.style.display="none";return;}
  const results=mflPlayers.filter(p=>p.name&&(norm(p.name).includes(q)||norm(displayName(p.name)).includes(q)))
    .sort((a,b)=>{ const an=norm(displayName(a.name)),bn=norm(displayName(b.name)); return(an.startsWith(q)?0:1)-(bn.startsWith(q)?0:1)||an.localeCompare(bn); }).slice(0,12);
  if(!results.length){box.style.display="none";return;}
  box.innerHTML=results.map(p=>{ const dn=displayName(p.name),already=inWl.has(norm(dn));
    const rook=p.status==="R"||p.rook==="1";
    return`<div class="add-result${already?" already":""}" ${already?"":`onclick="addFromPool('${dn.replace(/'/g,"\\'")}','${p.position||""}')"`}>
      <span class="add-result-name">${dn}${rook?' <span class="rookie-badge">R</span>':""}</span>
      <span class="add-result-meta">${p.position||""}${p.team?" · "+p.team:""}</span></div>`;
  }).join("");
  box.style.display="block";
}
function addFromPool(name,pos){
  if(watchlist.some(p=>norm(p.name)===norm(name)))return;
  recordChange(); watchlist.push({name,pos}); localStorage.setItem("wl",JSON.stringify(watchlist));
  const status=computePlayerStatus(name);
  if(status){playerStatus[norm(name)]=status;localStorage.setItem("ps",JSON.stringify(playerStatus));}
  saveHistory("Added "+name);
  document.getElementById("add-search").value=""; document.getElementById("add-results").style.display="none";
  buildNameDropdown();buildTeamFilter();renderList();
}

// ── Roster helpers ─────────────────────────────────────────────────────────────
function loadCachedRosters(){
  const data=JSON.parse(localStorage.getItem("leagueRostersData")||"null"); if(!data)return null;
  const result={};
  LEAGUES.forEach(cfg=>{
    const rs=data[cfg.id];
    if(!rs)result[cfg.id]=null;
    else if(rs.twoCopy)result[cfg.id]={mineCount:rs.mineCount,otherCount:rs.otherCount,nwoOwners:rs.nwoOwners||{},twoCopy:true};
    else result[cfg.id]={mine:new Set(rs.mine),other:new Set(rs.other),owners:rs.owners||{}};
  });
  return result;
}
function computePlayerStatus(name){
  const pid=nameToId[norm(name)],rosters=loadCachedRosters(); if(!rosters||!pid)return null;
  const ls={};
  LEAGUES.forEach(cfg=>{
    const rs=rosters[cfg.id];
    if(!rs)ls[cfg.id]=cfg.twoCopy?["error","error"]:"error";
    else if(cfg.twoCopy)ls[cfg.id]=twoCopyStatuses(rs.mineCount[pid]||0,rs.otherCount[pid]||0);
    else{ if(rs.mine.has(pid))ls[cfg.id]="mine"; else if(rs.other.has(pid))ls[cfg.id]="taken"; else ls[cfg.id]="available"; }
  });
  return ls;
}

// ── Refresh ────────────────────────────────────────────────────────────────────
async function doRefresh(){
  const btn=document.getElementById("refresh-btn"); btn.disabled=true;btn.textContent="… Refreshing";
  const rosterErrors=[],newNames={},leagueRosters={};

  for(const cfg of LEAGUES){
    let fetched=false;
    for(const year of ["2026","2025"]){
      try{
        const rData=await mfl(cfg.server,cfg.id,"rosters",year);
        let myFranchiseId=null;
        const frNames={};  // id → name for this league
        try{
          const lg=await mfl(cfg.server,cfg.id,"league",year);
          newNames[cfg.id]=lg?.league?.name||cfg.id;
          const frs=toArr(lg?.league?.franchises?.franchise);
          frs.forEach(fr=>{ frNames[fr.id]=stripHtml(fr.name); });
          const matchName=MY_TEAM_MATCH[cfg.id]||MY_TEAM_NAMES[cfg.id]||"";
          const myFr=frs.find(fr=>norm(fr.name)===norm(matchName));
          myFranchiseId=myFr?.id||null;
        }catch{newNames[cfg.id]=cfg.id;}

        const allFr=toArr(rData?.rosters?.franchise);

        if(cfg.twoCopy){
          const mineCount={},otherCount={},nwoOwners={};
          allFr.forEach(fr=>{
            const isMe=myFranchiseId&&fr.id===myFranchiseId;
            const frName=frNames[fr.id]||"";
            toArr(fr.player).forEach(p=>{
              if(isMe){ mineCount[p.id]=(mineCount[p.id]||0)+1; }
              else{
                otherCount[p.id]=(otherCount[p.id]||0)+1;
                if(frName){ if(!nwoOwners[p.id])nwoOwners[p.id]=[]; nwoOwners[p.id].push(frName); }
              }
            });
          });
          leagueRosters[cfg.id]={mineCount,otherCount,nwoOwners,twoCopy:true};
        }else{
          const mine=new Set(),other=new Set(),owners={};
          allFr.forEach(fr=>{
            const isMe=myFranchiseId&&fr.id===myFranchiseId;
            const frName=frNames[fr.id]||"";
            toArr(fr.player).forEach(p=>{
              isMe?mine.add(p.id):other.add(p.id);
              if(!isMe&&frName) owners[p.id]=frName;
            });
          });
          leagueRosters[cfg.id]={mine,other,owners};
        }
        fetched=true;break;
      }catch(e){ rosterErrors.push(cfg.id+"/"+year+": "+e.message); leagueRosters[cfg.id]=null; }
    }
    if(!fetched){newNames[cfg.id]=cfg.id;leagueRosters[cfg.id]=null;}
  }

  leagueNames=newNames;
  const rfs={};
  LEAGUES.forEach(cfg=>{
    const rs=leagueRosters[cfg.id];
    if(!rs)rfs[cfg.id]=null;
    else if(cfg.twoCopy)rfs[cfg.id]={mineCount:rs.mineCount,otherCount:rs.otherCount,nwoOwners:rs.nwoOwners,twoCopy:true};
    else rfs[cfg.id]={mine:[...rs.mine],other:[...rs.other],owners:rs.owners};
  });
  localStorage.setItem("leagueRostersData",JSON.stringify(rfs));

  const statusMap={};
  watchlist.forEach(player=>{
    const pid=nameToId[norm(player.name)]; const ls={};
    LEAGUES.forEach(cfg=>{
      const rs=leagueRosters[cfg.id];
      if(!rs)ls[cfg.id]=cfg.twoCopy?["error","error"]:"error";
      else if(!pid)ls[cfg.id]=cfg.twoCopy?["unknown","unknown"]:"unknown";
      else if(cfg.twoCopy)ls[cfg.id]=twoCopyStatuses(rs.mineCount[pid]||0,rs.otherCount[pid]||0);
      else{ if(rs.mine.has(pid))ls[cfg.id]="mine"; else if(rs.other.has(pid))ls[cfg.id]="taken"; else ls[cfg.id]="available"; }
    }); statusMap[norm(player.name)]=ls;
  });
  playerStatus=statusMap;

  const now=new Date();
  lastRefresh=now.toLocaleString([],{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit",second:"2-digit"});
  localStorage.setItem("ps",JSON.stringify(playerStatus)); localStorage.setItem("ln",JSON.stringify(leagueNames)); localStorage.setItem("lr",lastRefresh);
  const loaded=Object.values(leagueRosters).filter(r=>r!==null).length;
  const ownerCount=Object.values(leagueRosters).reduce((sum,rs)=>{
    if(!rs)return sum;
    if(rs.twoCopy)return sum+Object.keys(rs.nwoOwners||{}).length;
    return sum+Object.keys(rs.owners||{}).length;
  },0);
  document.getElementById("debug").textContent=loaded+"/6 leagues · "+ownerCount+" ownership records"+(rosterErrors.length?" · "+rosterErrors[0]:"");
  document.getElementById("timestamp").textContent="Updated "+lastRefresh;
  btn.disabled=false;btn.textContent="↻ Refresh";
  renderLeagueKey();renderList();
}

// ── Render ─────────────────────────────────────────────────────────────────────
function toggleOwners(idx){
  const el=document.getElementById("owners-"+idx);
  const btn=document.getElementById("owntoggle-"+idx);
  if(!el)return;
  const opening=el.style.display==="none";
  el.style.display=opening?"contents":"none";
  btn.classList.toggle("open",opening);
}

function clearFilters(){
  [fv.name,fv.pos,fv.nflteam,fv.status,fv.format,fv.league].forEach(s=>s.clear());
  fv.sort="az";
  closeFilter();
  buildLeagueFilter();
  ["name","pos","nflteam","status","format","league","sort"].forEach(k=>updateFilterBtn(k));
  document.getElementById("clear-filters-btn").style.display="none";
  renderList();
}

function renderLeagueKey(){
  const groups=[{label:"SF",ids:LEAGUES.filter(c=>c.label==="SF")},{label:"SF/TE+",ids:LEAGUES.filter(c=>c.label==="SF/TE+")}];
  document.getElementById("league-key").innerHTML=groups.map(g=>`<div class="league-group"><span class="league-group-label">${g.label}</span>${g.ids.map(c=>`[${LEAGUES.indexOf(c)+1}] ${MY_TEAM_NAMES[c.id]||c.id}`).join("  ")}</div>`).join("");
}
// ── Filter state ─────────────────────────────────────────────────────────────
const fv={name:new Set(),pos:new Set(),nflteam:new Set(),status:new Set(),format:new Set(),league:new Set(),sort:"az"};
const filterData={};   // key -> [{val,label}]
let activeKey=null;

function openFilter(btn,key){
  if(activeKey===key){closeFilter();return;}
  closeFilter();
  activeKey=key;
  btn.classList.add("active");
  renderPanel(key,"");
  const panel=document.getElementById("filter-panel");
  const r=btn.getBoundingClientRect();
  const minW=Math.max(btn.offsetWidth,220);
  const left=Math.min(r.left, window.innerWidth-minW-8);
  panel.style.top=(r.bottom+4)+"px";
  panel.style.left=Math.max(8,left)+"px";
  panel.style.minWidth=minW+"px";
  panel.style.display="block";
  document.getElementById("fp-search").value="";
  setTimeout(()=>document.getElementById("fp-search").focus(),40);
}
function closeFilter(){
  if(!activeKey)return;
  document.getElementById("filter-panel").style.display="none";
  document.querySelectorAll(".filter-btn.active").forEach(b=>b.classList.remove("active"));
  activeKey=null;
}
function fpSearch(val){if(activeKey)renderPanel(activeKey,val);}

function renderPanel(key,search){
  const opts=filterData[key]||[];
  const q=search.toLowerCase();
  const isSort=(key==="sort");
  const sel=fv[key];
  const filtered=opts.filter(o=>!o.val||!q||o.label.toLowerCase().includes(q));
  let html="";
  filtered.forEach(o=>{
    if(!o.val&&!isSort){
      const allVals=opts.filter(x=>x.val).map(x=>x.val);
      const allOn=allVals.length>0&&allVals.every(v=>sel.has(v));
      const someOn=sel.size>0&&!allOn;
      html+=`<div class="fp-item" onclick="fpSelectAll('${key}')">
        <input type="checkbox" ${allOn?"checked":""} ${someOn?"data-indeterminate=true":""} onclick="event.preventDefault()">
        <label>Select All</label></div>`;
    } else {
      const on=isSort?(sel===o.val):sel.has(o.val);
      html+=`<div class="fp-item" onclick="fpSelect('${key}','${o.val.replace(/'/g,"\'")}')">
        <input type="checkbox" ${on?"checked":""} onclick="event.preventDefault()">
        <label>${o.label}</label></div>`;
    }
  });
  document.getElementById("fp-opts").innerHTML=html;
  // apply indeterminate state
  document.querySelectorAll("#fp-opts [data-indeterminate]").forEach(el=>{el.indeterminate=true;});
}

function fpSelect(key,val){
  if(key==="sort"){fv.sort=val;closeFilter();}
  else{const s=fv[key];s.has(val)?s.delete(val):s.add(val);if(key==="format")buildLeagueFilter();}
  updateFilterBtn(key);renderPanel(key,document.getElementById("fp-search").value||"");renderList();
}
function fpSelectAll(key){
  const s=fv[key];
  const allVals=(filterData[key]||[]).filter(o=>o.val).map(o=>o.val);
  if(allVals.every(v=>s.has(v)))s.clear();else allVals.forEach(v=>s.add(v));
  if(key==="format")buildLeagueFilter();
  updateFilterBtn(key);renderPanel(key,document.getElementById("fp-search").value||"");renderList();
}
function updateFilterBtn(key){
  const btn=document.getElementById("fb-"+key);
  if(!btn)return;
  const n=fv[key] instanceof Set?fv[key].size:(fv[key]!=="az"?1:0);
  let badge=btn.querySelector(".fb-badge");
  if(n>0){
    if(!badge){badge=document.createElement("span");badge.className="fb-badge";btn.appendChild(badge);}
    badge.textContent=n;
  } else if(badge){badge.remove();}
}
function setFilterData(key,opts){filterData[key]=opts;}

document.addEventListener("click",e=>{
  if(!e.target.closest(".filter-btn")&&!e.target.closest("#filter-panel"))closeFilter();
});

function function buildFormatFilter(){
  const formats=[...new Set(LEAGUES.map(c=>c.label))];
  setFilterData("format",[{val:"",label:"Select All"},...formats.map(f=>({val:f,label:f}))]);
}
function buildLeagueFilter(){
  const pool=fv.format.size>0?LEAGUES.filter(c=>fv.format.has(c.label)):LEAGUES;
  const validNums=new Set(pool.map(c=>String(LEAGUES.indexOf(c)+1)));
  fv.league.forEach(n=>{if(!validNums.has(n))fv.league.delete(n);});
  setFilterData("league",[{val:"",label:"Select All"},...pool.map(c=>{
    const num=LEAGUES.indexOf(c)+1;
    return{val:String(num),label:`[${num}] ${MY_TEAM_NAMES[c.id]||c.id}`};
  })]);
  if(activeKey==="league")renderPanel("league",document.getElementById("fp-search")?.value||"");
}
function buildTeamFilter(){
  const teams=new Set(); watchlist.forEach(p=>{const m=getPlayerMeta(p.name);if(m?.team)teams.add(m.team);});
  setFilterData("nflteam",[{val:"",label:"Select All"},...[...teams].sort().map(t=>({val:t,label:t}))]);
}
function buildLeagueFilter(){
  const sel=document.getElementById("wl-league"); if(!sel)return;
  const cur=sel.value;
  sel.innerHTML='<option value="">Leagues</option>'+
    LEAGUES.map(c=>`<option value="${c.id}"${c.id===cur?" selected":""}>${MY_TEAM_NAMES[c.id]||c.id}</option>`).join("");
}

function buildNameDropdown(){
  const sorted=[...watchlist].sort((a,b)=>sortKey(a.name).localeCompare(sortKey(b.name)));
  setFilterData("name",[{val:"",label:"Select All"},...sorted.map(p=>({val:norm(p.name),label:p.name}))]);
}

function renderList(){
  const sortV=fv.sort||"az";
  const el=document.getElementById("player-list");
  const rosters=loadCachedRosters();

  let rows=watchlist.map((p,i)=>({...p,i})).filter(p=>{
    if(fv.name.size>0&&!fv.name.has(norm(p.name)))return false;
    if(fv.pos.size>0&&!fv.pos.has(p.pos))return false;
    if(fv.nflteam.size>0){const m=getPlayerMeta(p.name);if(!fv.nflteam.has(m?.team||""))return false;}
    if(fv.status.size>0){
      const st=playerStatus[norm(p.name)]||{};
      let cfgs;
      if(fv.league.size>0) cfgs=[...fv.league].map(n=>LEAGUES[parseInt(n)-1]).filter(Boolean);
      else if(fv.format.size>0) cfgs=LEAGUES.filter(c=>fv.format.has(c.label));
      else cfgs=LEAGUES;
      const vals=cfgs.flatMap(c=>{const s=st[c.id];return Array.isArray(s)?s:[s];});
      if(!vals.some(v=>fv.status.has(v)))return false;
    }
    return true;
  });

  // Sort
  if(sortV==="rookies") rows=rows.filter(p=>isRookie(p.name));
  rows.sort((a,b)=>sortV==="za"
    ?sortKey(b.name).localeCompare(sortKey(a.name))
    :sortKey(a.name).localeCompare(sortKey(b.name)));

  document.getElementById("subtitle").textContent=watchlist.length+" players · 6 leagues";
  const anyFilter=fv.name.size>0||fv.pos.size>0||fv.nflteam.size>0||fv.status.size>0||fv.format.size>0||fv.league.size>0;
  document.getElementById("clear-filters-btn").style.display=anyFilter?"inline":"none";
  if(!rows.length){el.innerHTML='<p class="no-results">No players match.</p>';return;}

  const dimColor="#374151";
  // Which league IDs are "in scope" for the current Format/League filter
  const scopeIds=(()=>{
    if(fv.league.size>0)return new Set([...fv.league].map(n=>LEAGUES[parseInt(n)-1]?.id).filter(Boolean));
    if(fv.format.size>0)return new Set(LEAGUES.filter(c=>fv.format.has(c.label)).map(c=>c.id));
    return null; // all in scope
  })();
  const shouldDim=(cfg,s)=>{
    const sv=typeof s==="string"?s:"unknown";
    if(fv.status.size>0&&!fv.status.has(sv))return true;   // status mismatch
    if(scopeIds!==null&&!scopeIds.has(cfg.id))return true;  // out of scope league/format
    return false;
  };
  const makeIcon=(cfg,s)=>{
    const num=LEAGUES.indexOf(cfg)+1,ln=MY_TEAM_NAMES[cfg.id]||cfg.id;
    const sv=typeof s==="string"?s:"unknown";
    const bg=shouldDim(cfg,sv)?dimColor:iconColor(sv);
    return`<span class="league-icon" style="background:${bg}" title="[${num}] ${ln} — ${iconLabel(sv)}">${num}</span>`;
  };
  const makeNwoIcon=(cfg,s)=>{
    const num=LEAGUES.indexOf(cfg)+1,ln=MY_TEAM_NAMES[cfg.id]||cfg.id;
    const st=Array.isArray(s)?s:["unknown","unknown"];
    return`<span class="nwo-oval">${st.map((si,k)=>{
      const bg=shouldDim(cfg,si)?dimColor:iconColor(si);
      return`<span class="league-icon" style="background:${bg}" title="[${num}] ${ln} — Copy ${k+1}: ${iconLabel(si)}">${num}</span>`;
    }).join("")}</span>`;
  };

  // Build "> Team Name" lines for a group of leagues — only when someone else owns the player
  const buildStatusLines=(status,pid)=>{
    const lineFor=(cfg)=>{
      const num=LEAGUES.indexOf(cfg)+1;
      if(cfg.twoCopy){
        const st=Array.isArray(status[cfg.id])?status[cfg.id]:["unknown","unknown"];
        const rawOwners=(rosters&&pid)?rosters[cfg.id]?.nwoOwners?.[pid]||[]:[];
        let ti=0;
        const parts=st.map(s=>{
          if(s==="taken"){ const n=rawOwners[ti++]||""; return n||"Rostered"; }
          return s==="mine"?"My Team":s==="available"?"Available":"Unknown";
        });
        return`<div class="owner-line">[${num}] ${parts.join(" & ")}</div>`;
      }else{
        const sv=typeof status[cfg.id]==="string"?status[cfg.id]:"unknown";
        let d;
        if(sv==="taken"){ const n=(rosters&&pid)?rosters[cfg.id]?.owners?.[pid]||"":""; d=n||"Rostered"; }
        else if(sv==="mine") d="My Team";
        else if(sv==="available") d="Available";
        else d="Unknown";
        return`<div class="owner-line">[${num}] ${d}</div>`;
      }
    };
    const sfLines  =LEAGUES.filter(c=>c.label==="SF"   ).map(lineFor).join("");
    const sfteLines=LEAGUES.filter(c=>c.label==="SF/TE+").map(lineFor).join("");
    return`<div class="avail-grid">
      <div class="avail-col">${sfLines}</div>
      <div class="avail-col">${sfteLines}</div>
    </div>`;
  };

  el.innerHTML=rows.map(({name,pos,i})=>{
    const status=playerStatus[norm(name)]||{};
    const meta=getPlayerMeta(name);
    const team=meta?.team||"";
    const rookie=isRookie(name);
    const pid=nameToId[norm(name)];
    const sfIcons  =LEAGUES.filter(c=>c.label==="SF").map(c=>makeIcon(c,status[c.id])).join("");
    const sfteIcons=LEAGUES.filter(c=>c.label==="SF/TE+").map(c=>c.twoCopy?makeNwoIcon(c,status[c.id]):makeIcon(c,status[c.id])).join("");
    const allStatuses=buildStatusLines(status,pid);

    return`<div class="player-row">
      <div class="player-name-row">
        <button class="owner-toggle" id="owntoggle-${i}" onclick="toggleOwners(${i})">▶</button>
        <span class="player-name">${name}</span>
        <span class="player-pos">${pos}</span>
        ${team?`<span class="player-team">${team}</span>`:""}
        ${rookie?'<span class="rookie-badge">R</span>':""}
        <button class="remove-btn" onclick="removePlayer(${i})">×</button>
      </div>
      <span class="player-section-label">Status</span>
      <div class="icon-row-group">
        <div class="icon-row-line"><span class="row-label">SF</span>${sfIcons}</div>
        <div class="icon-row-line"><span class="row-label">SF/TE+</span>${sfteIcons}</div>
      </div>
      <div id="owners-${i}" style="display:none">${allStatuses}</div>
    </div>`;
  }).join("");
}

function removePlayer(i){
  const name=watchlist[i]?.name||"Player";
  recordChange(); watchlist=watchlist.filter((_,j)=>j!==i);
  localStorage.setItem("wl",JSON.stringify(watchlist));
  saveHistory("Removed "+name);
  buildNameDropdown();buildTeamFilter();renderList();
}

if(lastRefresh)document.getElementById("timestamp").textContent="Updated "+lastRefresh;
renderLeagueKey();
setFilterData("pos",[{val:"",label:"Select All"},{val:"QB",label:"QB"},{val:"RB",label:"RB"},{val:"WR",label:"WR"},{val:"TE",label:"TE"}]);
setFilterData("status",[{val:"",label:"Select All"},{val:"available",label:"Available"},{val:"mine",label:"My Team"},{val:"taken",label:"Rostered"},{val:"unknown",label:"Unknown"}]);
setFilterData("sort",[{val:"az",label:"A to Z"},{val:"za",label:"Z to A"},{val:"rookies",label:"Rookies Only"}]);
buildNameDropdown();buildFormatFilter();buildLeagueFilter();buildTeamFilter();renderList();renderHistory();
loadPlayerPool();
</script>
<div id="filter-panel" onclick="event.stopPropagation()">
  <div id="fp-search-wrap"><input id="fp-search" type="text" placeholder="Search..." oninput="fpSearch(this.value)" onclick="event.stopPropagation()"></div>
  <div id="fp-opts"></div>
</div>
